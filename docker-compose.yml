services:
  anchor-engine:
    build:
      context: .
      dockerfile: Dockerfile
    image: anchor-engine:latest
    container_name: anchor-engine
    ports:
      - "3160:3160"
    volumes:
      # Persistent data (database) - same as native engine/context_data
      - anchor-data:/app/engine/context_data
      
      # User data directories - match native deployment structure
      - ./inbox:/app/inbox                    # Auto-ingested files
      - ./external-inbox:/app/external-inbox  # External source files
      - ./mirrored_brain:/app/mirrored_brain  # Source of truth filesystem
      - ./backups:/app/backups                # Phoenix Protocol backups
      - ./notebook:/app/notebook              # Synonym rings, notes, outputs
      
      # Optional: Mount user settings
      - ./user_settings.json:/app/user_settings.json:ro
      
    environment:
      - NODE_ENV=production
      - PORT=3160
      # These environment variables ensure paths match native deployment
      - PROJECT_ROOT=/app
      - CONTEXT_DIR=/app/engine/context_data
      - NOTEBOOK_DIR=/app/notebook
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3160/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # Resource limits - tested on 4GB RAM laptops
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

volumes:
  anchor-data:
    name: anchor-engine-data

# =============================================================================
# Usage
# =============================================================================
# Build and start:
#   docker-compose up -d --build
#
# View logs:
#   docker-compose logs -f
#
# Stop:
#   docker-compose down
#
# Stop and remove data:
#   docker-compose down -v
#
# Access UI:
#   http://localhost:3160
#
# Health check:
#   curl http://localhost:3160/health
#
# Add files to inbox (auto-ingested):
#   cp myfile.md ./inbox/
#
# Backup data (Phoenix Protocol):
#   # Backups are automatically saved to ./backups/
#   ls -la ./backups/
#
# Access synonym rings:
#   ls -la ./notebook/
#
# Restore from backup:
#   # Use UI or API to restore from ./backups/backup_TIMESTAMP.json
#
# =============================================================================
