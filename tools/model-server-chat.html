<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coda Sovereign Console (Graph-R1)</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background: #1e1e1e;
            color: #ccc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            height: 100vh;
            margin: 0;
        }

        /* --- Resizable Split Layout --- */
        #container {
            display: flex;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        #sidebar {
            width: 320px;
            /* Default width */
            min-width: 200px;
            max-width: 80%;
            background: #1e1e1e;
            color: #d4d4d4;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #333;
            transition: width 0.1s ease;
            /* smooth resize stop */
        }

        /* Resize Handle */
        #resizer {
            width: 5px;
            cursor: col-resize;
            background: #333;
            transition: background 0.2s;
            z-index: 10;
        }

        #resizer:hover,
        #resizer.resizing {
            background: #0078d4;
        }

        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #2d2d2d;
            position: relative;
            min-width: 0;
            /* Prevent flex overflow */
        }

        /* --- Collapsible Details --- */
        details {
            margin-bottom: 10px;
            border-bottom: 1px solid #333;
        }

        summary {
            padding: 10px;
            cursor: pointer;
            font-weight: bold;
            user-select: none;
            background: #252526;
            list-style: none;
            /* Hide default triangle */
        }

        summary::-webkit-details-marker {
            display: none;
        }

        summary::after {
            content: '‚ñº';
            float: right;
            font-size: 0.8em;
            transition: transform 0.2s;
        }

        details[open] summary::after {
            transform: rotate(180deg);
        }

        .panel-content {
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* --- Mobile Responsive --- */
        @media (max-width: 768px) {
            #container {
                flex-direction: column;
            }

            #sidebar {
                width: 100% !important;
                /* Force full width */
                height: auto;
                max-height: 40vh;
                /* Limit height on mobile */
                overflow-y: auto;
                border-right: none;
                border-bottom: 2px solid #333;
            }

            #resizer {
                display: none;
                /* No horizontal resize on mobile */
            }
        }

        #chat-box {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 20px;
            padding-right: 10px;
        }

        #chat-box::-webkit-scrollbar {
            width: 8px;
        }

        #chat-box::-webkit-scrollbar-track {
            background: #333;
        }

        #chat-box::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 4px;
        }

        .msg {
            padding: 12px;
            margin: 8px 0;
            border-radius: 6px;
            background: #333;
            max-width: 85%;
            word-wrap: break-word;
        }

        .user {
            background: #0078d4;
            color: white;
            align-self: flex-end;
            margin-left: auto;
        }

        .assistant {
            background: #2d2d2d;
            border-left: 3px solid #0078d4;
        }

        .msg details {
            margin-top: 10px;
            font-size: 0.85rem;
            opacity: 0.7;
        }

        .msg pre {
            background: #1e1e1e;
            padding: 8px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 0.8rem;
        }

        h3 {
            margin: 0 0 10px 0;
        }

        #status-text {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 8px;
        }

        #progress-bar {
            height: 4px;
            background: #333;
            border-radius: 2px;
            overflow: hidden;
            margin: 8px 0;
        }

        #progress {
            height: 100%;
            background: #0078d4;
            width: 0%;
            transition: width 0.2s;
        }

        #status-log {
            flex: 1;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
            margin-top: 10px;
            padding: 8px;
            background: #1a1a1a;
            border-radius: 4px;
            border: 1px solid #333;
        }

        #status-log div {
            margin: 2px 0;
            padding: 2px 0;
        }

        .info {
            color: #888;
        }

        .warn {
            color: #d7ba7d;
        }

        .error {
            color: #f48771;
        }

        .success {
            color: #89d185;
        }

        #input-area {
            display: flex;
            gap: 10px;
        }

        textarea {
            flex: 1;
            height: 60px;
            background: #3c3c3c;
            border: 1px solid #555;
            color: white;
            padding: 10px;
            border-radius: 4px;
            resize: vertical;
            font-family: 'Segoe UI', sans-serif;
        }

        textarea:focus {
            outline: none;
            border-color: #0078d4;
        }

        button {
            padding: 8px 20px;
            background: #0078d4;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            align-self: flex-end;
        }

        button:hover {
            background: #1084d7;
        }

        .msg.assistant {
            background: #2d2d2d;
            align-self: flex-start;
        }

        .msg.system {
            background: #3c3c3c;
            align-self: center;
            font-style: italic;
            font-size: 11px;
        }

        /* Old details/summary styles, replaced by new ones above */
        /*
        details {
            margin-top: 5px;
            background: #252526;
            border: 1px solid #444;
            border-radius: 4px;
            font-size: 11px;
            overflow: hidden;
        }

        summary {
            padding: 5px 10px;
            cursor: pointer;
            list-style: none;
            display: flex;
            align-items: center;
            gap: 5px;
            opacity: 0.8;
            font-weight: bold;
        }

        summary:hover {
            opacity: 1;
            background: #2a2a2b;
        }

        summary::before {
            content: '‚ñ∂';
            font-size: 8px;
            transition: transform 0.2s;
        }

        details[open] summary::before {
            transform: rotate(90deg);
        }
        */

        details pre {
            margin: 0;
            padding: 10px;
            background: #1e1e1e;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 200px;
            overflow-y: auto;
        }

        .streaming {
            border-right: 2px solid var(--accent);
            animation: blink 0.7s infinite;
        }

        @keyframes blink {
            50% {
                border-color: transparent;
            }
        }

        button:disabled {
            background: #555;
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <div id="container">
        <div id="sidebar">
            <div style="padding: 10px; font-weight: bold; font-size: 16px; border-bottom: 1px solid #444;">
                ‚ö° Sovereign Coda
            </div>
            <small id="status-text" style="padding: 0 10px;">Initializing...</small>
            <div id="progress-bar" style="margin: 8px 10px 15px 10px;">
                <div id="progress"></div>

            <!-- COLLAPSIBLE: Model Selection -->

                    </select>

                        style="width: 100%; padding: 5px; background: #333; color: white; border: 1px solid #555;">

                            <option value="mlc-ai/DeepSeek-V2-Lite-Chat-q4f16_1-MLC">DeepSeek-V2-Lite (Experimental)
                            </option>
                            <option value="mlc-ai/Hermes-3-Llama-3.2-3B-q4f16_1-MLC">Hermes-3-Llama-3.2-3B</option>
                        </optgroup>
                        <optgroup label="Experimental / Legacy">
                            <option value="mlc-ai/OpenHermes-2.5-Mistral-7B-q4f16_1-MLC">OpenHermes-2.5-Mistral-7B

                            <option value="mlc-ai/NeuralHermes-2.5-Mistral-7B-q3f16_1-MLC">NeuralHermes-2.5-Mistral-7B

                            <option value="mlc-ai/Qwen2-7B-Instruct-q4f16_1-MLC">Qwen2-7B</option>
                            <option value="mlc-ai/Llama-3.1-8B-Instruct-q4f32_1-MLC">Llama-3.1-8B</option>
                            <option value="mlc-ai/gemma-2-9b-it-q4f16_1-MLC">Gemma-2-9B</option>
                            <option value="mlc-ai/gemma-2-2b-it-q4f16_1-MLC">Gemma-2-2B</option>
                            <!-- Custom input handled via logic -->
                        </optgroup>
                        <optgroup label="Specialized">
                            <option value="mlc-ai/Qwen2.5-Coder-1.5B-Instruct-q4f16_1-MLC">Qwen2.5-Coder-1.5B</option>
                            <option value="mlc-ai/Phi-3.5-vision-instruct-q4f16_1-MLC">Phi-3.5-vision</option>
                        </optgroup>
                        <option value="custom">-- Custom --</option>
                    </select>
                    <input id="custom-model-input" type="text" placeholder="Custom model ID"
                        style="width: 100%; padding: 5px; font-size: 11px;" disabled />
                    <button id="load-model-btn" disabled
                        style="width: 100%; padding: 6px; background: #0078d4; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 11px;">Load
                        Model</button>
                </div>
            </details>

            <!-- COLLAPSIBLE: Controls & Quota -->
            <details>
                <summary>System Controls</summary>
                <div class="panel-content">
                    <button id="attempt-indexeddb-load-btn"
                        style="width: 100%; padding: 6px; background: #6c757d; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 11px;">Attempt
                        Load IndexedDB</button>
                    <button id="clear-cache-btn"
                        style="width: 100%; padding: 6px; background: #a43131; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 11px;">‚ö†Ô∏è
                        Delete All Model Cache</button>
                    <small style="display:block;color:#aaa;">Use if WASM panicked or Quota Exceeded.</small>
                </div>
            </details>

            <!-- COLLAPSIBLE: Logs -->
            <details open style="flex: 1; display: flex; flex-direction: column;">
                <summary>System Logs</summary>
                <div class="panel-content" style="flex: 1; display: flex; flex-direction: column; overflow: hidden;">
                    <button id="copy-logs-btn"
                        style="width: 100%; padding: 4px; background: #333; color: #ccc; border: 1px solid #555; border-radius: 4px; cursor: pointer; font-size: 10px;">üìã
                        Copy Logs</button>
                    <div id="status-log"
                        style="flex: 1; overflow-y: auto; border-top: 1px solid #444; margin-top: 5px; min-height: 100px;">
                    </div>
                </div>
            </details>
        </div>

        <!-- RESIZE HANDLE -->
        <div id="resizer"></div>



        <div id="main">
            <!-- Split view for Chat and Context -->
            <div style="flex: 1; display: flex; height: 100%; overflow: hidden;">
                <!-- Chat Column -->
                <div style="flex: 1; display: flex; flex-direction: column; border-right: 1px solid #333;">
                    <div style="padding: 10px; background: #252526; font-weight: bold; border-bottom: 1px solid #333;">
                        üí¨ Chat Stream</div>
                    <div id="chat-box" style="flex: 1; overflow-y: auto; padding-right: 10px;"></div>
                    <div id="input-area" style="padding: 10px; border-top: 1px solid #333;">
                        <textarea id="input" disabled placeholder="Waiting for Engine..."></textarea>
                        <button id="send-btn" disabled>Send</button>
                    </div>
                </div>

                <!-- Context Column -->
                <div style="width: 40%; display: flex; flex-direction: column; background: #222;">
                    <div style="padding: 10px; background: #252526; font-weight: bold; border-bottom: 1px solid #333;">
                        üß† Context / Memory</div>
                    <div id="context-box"
                        style="flex: 1; overflow-y: auto; padding: 10px; font-family: monospace; font-size: 12px; white-space: pre-wrap; color: #aaa;">
                        <div style="text-align: center; margin-top: 50px; color: #555;">(Memory retrievals will appear
                            here)</div>

    <script type="module">
        // --- IMPORTS ---
        import initCozo, { CozoDb } from './cozo_lib_wasm.js';
        import { loadAllFromIndexedDb, writeToIndexedDb } from './indexeddb.js';
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.16.0';
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";
        import { marked } from "https://cdn.jsdelivr.net/npm/marked/lib/marked.esm.js";

        env.allowLocalModels = false;

        // --- GLOBAL STATE ---
        let db;
        let embedder;
        let engine;
        let reasoningLoop;
        let selectedModelId = null;

        // --- BROADCAST CHANNEL FOR LOG-VIEWER ---
        const logChannel = new BroadcastChannel('sovereign-logs');
        // Additional mission-control channel (low-latency JSON messages)
        const codaChannel = new BroadcastChannel('coda_logs');

        // Helper to forward system/chat logs to mission-control channel
        function postCoda(msg, meta = {}) {
            try {
                codaChannel.postMessage(Object.assign({ source: 'Sovereign-Console', time: new Date().toISOString(), message: msg }, meta));
            } catch (e) {
                console.warn('coda post failed', e.message);
            }
        }

        // --- UI HELPERS ---
        const ui = {
            log: (msg, type = 'info') => {
                const el = document.getElementById('status-log');
                const div = document.createElement('div');
                div.className = type;
                div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
                div.style.fontSize = '11px';
                div.style.padding = '2px';
                div.style.borderBottom = '1px solid #222';
                el.insertBefore(div, el.firstChild);
                if (el.children.length > 100) el.removeChild(el.lastChild);

                // Send to log-viewer (legacy channel)
                logChannel.postMessage({ source: 'system', msg, type, time: new Date().toLocaleTimeString() });
                // Also post to Coda Mission Control channel for unified view
                try {
                    codaChannel.postMessage({ source: 'Sovereign-Console', message: msg, type, timestamp: new Date().toISOString() });
                } catch (e) {
                    console.warn('codaChannel post failed', e);
                }
            },
            append: (role, text, meta = null) => {
                const box = document.getElementById('chat-box');
                const div = document.createElement('div');
                div.className = `msg ${role}`;
                div.innerHTML = text ? marked.parse(text) : "";

                if (meta && meta.trace && meta.trace.length > 0) {
                    const details = document.createElement('details');
                    const summary = document.createElement('summary');
                    summary.textContent = 'üìã Reasoning Trace';
                    const pre = document.createElement('pre');
                    pre.textContent = JSON.stringify(meta.trace, null, 2);
                    details.appendChild(summary);
                    details.appendChild(pre);
                    div.appendChild(details);
                }

                box.appendChild(div);
                box.scrollTop = box.scrollHeight;

                // Return a handle for updating this message
                return {
                    div,
                    update: (newText, isMarkdown = true) => {
                        div.innerHTML = isMarkdown ? marked.parse(newText) : newText;
                        box.scrollTop = box.scrollHeight;
                    },
                    appendText: (chunk) => {
                        // For simple non-streaming render updates
                        if (div.innerText.endsWith("...")) div.innerText = div.innerText.slice(0, -3);
                        div.innerText += chunk;
                        box.scrollTop = box.scrollHeight;
                    }
                };
            },
            appendContext: (title, details) => {
                const box = document.getElementById('context-box');
                const div = document.createElement('div');
                div.style.borderBottom = '1px solid #333';
                div.style.marginBottom = '10px';
                div.style.paddingBottom = '10px';

                const h4 = document.createElement('div');
                h4.style.fontWeight = 'bold';
                h4.style.color = '#0078d4';
                h4.style.marginBottom = '5px';
                h4.textContent = `[${new Date().toLocaleTimeString()}] ${title}`;

                const p = document.createElement('div');
                p.style.whiteSpace = 'pre-wrap';
                p.textContent = details;

                div.appendChild(h4);
                div.appendChild(p);
                box.appendChild(div);
                box.scrollTop = box.scrollHeight;
            },
            appendReasoning: (label) => {
                const box = document.getElementById('chat-box');
                const details = document.createElement('details');
                details.open = true;
                const summary = document.createElement('summary');
                summary.textContent = `üìã ${label}`;
                const pre = document.createElement('pre');
                pre.className = "streaming";
                details.appendChild(summary);
                details.appendChild(pre);
                box.appendChild(details);
                box.scrollTop = box.scrollHeight;

                let content = "";
                return {
                    details,
                    pre,
                    update: (chunk) => {
                        content += chunk;
                        pre.textContent = content;
                        box.scrollTop = box.scrollHeight;
                    },
                    finish: (finalText) => {
                        if (finalText) pre.textContent = finalText;
                        pre.className = "";
                        details.open = false; // Collapse on finish
                    }
                };
            },
            updateProgress: (pct, text) => {
                document.getElementById('progress').style.width = (pct * 100) + "%";
                if (text) document.getElementById('status-text').innerText = text;
            }
        };

        // --- UTILS: Response Pattern Matcher ---
        class ResponsePattern {
            static match(response) {
                let data = response;
                // Parse if string
                if (typeof response === 'string') {
                    try {
                        const clean = response.replace(/```json/g, '').replace(/```/g, '').trim();
                        if (clean.startsWith('{')) {
                            data = JSON.parse(clean);
                        }
                    } catch (e) { }
                }

                // 1. Database Result (rows array)
                if (data?.rows && Array.isArray(data.rows)) {
                    return {
                        type: 'DB_RESULT',
                        rows: data.rows, // Use parsed data
                        count: data.rows.length
                    };
                }

                // 1.b Database Result (ok: true with rows inside?) - Handle specific Cozo return shapes if needed

                // 2. Search Plan (LLM JSON)
                if (data?.query && typeof data.query === 'string' && data?.hypothesis) {
                    return {
                        type: 'SEARCH_PLAN',
                        query: data.query,
                        hypothesis: data.hypothesis,
                        confidence: typeof data.confidence === 'number' ? data.confidence : 0.5
                    };
                }

                // 3. Error
                if (data?.error || (typeof response === 'string' && response.toLowerCase().includes('error:'))) {
                    return {
                        type: 'ERROR',
                        error: data?.error || response
                    };
                }

                // 3.b Cozo Error
                if (data?.ok === false && data?.message) {
                    return {
                        type: 'ERROR',
                        error: data.message
                    };
                }

                // 4. LLM Chat Response
                if (data?.choices && Array.isArray(data.choices) && data.choices.length > 0) {
                    const content = data.choices[0]?.message?.content || data.choices[0]?.text || '';
                    return {
                        type: 'LLM_RESPONSE',
                        text: content
                    };
                }

                // 5. Default / Raw Text
                return {
                    type: 'RAW_TEXT',
                    text: typeof response === 'string' ? response : JSON.stringify(response)
                };
            }
        }

        // --- LOGIC: Graph-R1 Loop ---
        class GraphR1ReasoningLoop {
            constructor(cozoDb, embedderFn) {
                this.db = cozoDb;
                // this.llm removed - we will use global 'engine' to ensure freshness
                this.embedder = embedderFn;
                this.maxIterations = 3;
                this.history = [];
            }

            async reason(userQuery) {
                let context = "";
                let iteration = 0;
                this.history = [];

                ui.log(`üß† Graph-R1 Loop Started: "${userQuery}"`, "info");

                // Ensure engine is alive and reset context
                if (!engine) throw new Error("LLM Engine not initialized.");
                await engine.resetChat();

                while (iteration < this.maxIterations) {
                    iteration++;
                    ui.log(`üîÑ Iteration ${iteration}/${this.maxIterations}...`, "warn");

                    try {
                        const planPrompt = `You are a Reasoning Engine.
User Query: "${userQuery}"
Time: ${Date.now()}

TASK: Generate a Datalog query to find relevant memories in the 'memory' table.
Schema: memory { id, timestamp, role, content, embedding } where timestamp is Unix MS.

OUTPUT FORMAT (JSON ONLY):
{
  "hypothesis": "Explanation of what to search for",
  "query": "?[id, content] := *memory{id, content, timestamp}, timestamp >= START, timestamp <= END",
  "confidence": 0.5
}

EXAMPLE (Do NOT Copy):
User: "What did I eat?"
JSON: { "hypothesis": "Searching for food memories", "query": "?[id, content] := *memory{id, content, timestamp}", "confidence": 0.9 }
`;

                        const reasoningUI = ui.appendReasoning(`Thinking: ${userQuery.substring(0, 30)}... (Iteration ${iteration})`);

                        // Use global 'engine' directly
                        const planStream = await engine.chat.completions.create({
                            messages: [{ role: "user", content: planPrompt }],
                            max_tokens: 300,
                            temperature: 0.3,
                            stream: true
                        });

                        let planText = "";
                        for await (const chunk of planStream) {
                            const delta = chunk.choices[0]?.delta?.content || "";
                            planText += delta;
                            reasoningUI.update(delta);
                        }
                        reasoningUI.finish();

                        const planResult = ResponsePattern.match(planText);

                        if (planResult.type !== 'SEARCH_PLAN') {
                            ui.log(`‚ö†Ô∏è Iteration ${iteration}: Plan generation failed. Got ${planResult.type}`, "warn");
                            if (iteration >= this.maxIterations) break;
                            continue;
                        }

                        ui.log(`ü§î Hypothesis: ${planResult.hypothesis}`, "info");

                        // Stop if confident
                        if (planResult.confidence >= 0.8) {
                            ui.log(`‚úÖ High confidence reached (${(planResult.confidence * 100).toFixed(0)}%)`, "success");
                            break;
                        }

                        // 2. QUERY: Execute Datalog
                        try {
                            const cleanQuery = planResult.query.replace(/```/g, '').trim();
                            const queryParams = {};

                            // Execute query
                            let dbRaw;
                            let dbResult;
                            try {
                                dbRaw = await this.db.run(cleanQuery, JSON.stringify(queryParams));
                                dbResult = ResponsePattern.match(dbRaw);
                            } catch (qe) {
                                // Handle known parser errors gracefully (e.g., missing sort key)
                                ui.log(`Query execution failed: ${qe.message}. Attempting sanitized fallback.`, "warn");
                                if (qe.message && qe.message.includes("Sort key 'timestamp' not found")) {
                                    try {
                                        const sanitized = cleanQuery.replace(/:sort\s+-timestamp/g, '');
                                        ui.log('Retrying query without :sort -timestamp', 'info');
                                        dbRaw = await this.db.run(sanitized, JSON.stringify(queryParams));
                                        dbResult = ResponsePattern.match(dbRaw);
                                    } catch (qe2) {
                                        ui.log(`Fallback query failed: ${qe2.message}`, 'error');
                                        dbResult = { type: 'ERROR', error: qe2.message };
                                    }
                                } else {
                                    dbResult = { type: 'ERROR', error: qe.message };
                                }
                            }

                            if (dbResult.type === 'DB_RESULT' && dbResult.count > 0) {
                                const newFacts = dbResult.rows
                                    .map((row, idx) => {
                                        // Handle array rows
                                        if (Array.isArray(row)) {
                                            return `[Fact ${idx + 1}] ${row.slice(1).join(': ')}`;
                                        }
                                        return `[Fact ${idx + 1}] ${JSON.stringify(row)}`;
                                    })
                                    .join("\n");

                                context += `\n--- Iteration ${iteration} Findings ---\n${newFacts}`;
                                ui.log(`üìö Retrieved ${dbResult.count} fact(s).`, "success");

                                // UPDATE CONTEXT UI
                                ui.appendContext(`Iteration ${iteration} Findings (${dbResult.count} facts)`, newFacts);

                                this.history.push({
                                    iteration,
                                    hypothesis: planResult.hypothesis,
                                    facts_retrieved: dbResult.count,
                                    confidence: planResult.confidence
                                });
                            } else if (dbResult.type === 'DB_RESULT') {
                                ui.log(`üì≠ Iteration ${iteration}: No matching facts found.`, "warn");
                                ui.appendContext(`Iteration ${iteration}`, "No matching memories found for: " + planResult.hypothesis);

                                this.history.push({
                                    iteration,
                                    hypothesis: planResult.hypothesis,
                                    facts_retrieved: 0,
                                    confidence: planResult.confidence
                                });
                            } else {
                                const err = dbResult.error || "Unknown DB Error";
                                ui.log(`‚ö†Ô∏è Query error: ${err}`, "error");
                                ui.appendContext(`Iteration ${iteration} Error`, err);
                            }

                        } catch (e) {
                            ui.log(`üî• Query execution failed: ${e.message}`, "error");
                        }

                    } catch (e) {
                        ui.log(`üí• Iteration ${iteration} error: ${e.message}`, "error");
                        if (e.message.includes("disposed") || e.message.includes("valid external Instance")) {
                            ui.log("‚ùå GPU CONTEXT LOST! The model driver has crashed. Please reload the page.", "error");
                            alert("GPU Crash Detected\n\nThe WebGPU context was lost (likely due to buffer overflow). Please reload the page.");
                            break; // Critical failure, stop loop
                        }
                    }
                }

                ui.log(`‚ú® Graph-R1 Loop completed after ${iteration} iteration(s).`, "success");
                return { context, trace: this.history };
            }
        }

        async function handleSend() {

            input.value = "";

            document.getElementById('send-btn').disabled = true;

            ui.append("user", text);

            try {
                // 1. Run Graph-R1 Loop
                const { context, trace } = await reasoningLoop.reason(text);

                // 2. Final Synthesis with Streaming
                ui.log("üß™ Synthesizing final answer...", "warn");

                const sysPrompt = `You are a helpful assistant with access to retrieved context from the user's memory system.

Use the following context to answer the user's question. Be specific and cite the memory when relevant.

CONTEXT:
${context || "(No relevant context found)"}

If context is insufficient, say so clearly.`;

                const msgHandle = ui.append("assistant", "");

                const stream = await engine.chat.completions.create({
                    messages: [
                        { role: "system", content: sysPrompt },
                        { role: "user", content: text }
                    ],
                    max_tokens: 500,
                    temperature: 0.7,
                    stream: true
                });

                let fullAnswer = "";
                for await (const chunk of stream) {
                    const delta = chunk.choices[0]?.delta?.content || "";
                    fullAnswer += delta;
                    msgHandle.update(fullAnswer);
                }

                ui.log("‚úÖ Response generated.", "success");

            } catch (e) {
                ui.log(`Error: ${e.message}`, "error");
                ui.append("system", `Error: ${e.message}`);
            } finally {
                input.disabled = false;
                document.getElementById('send-btn').disabled = false;
                input.focus();
            }
        }
