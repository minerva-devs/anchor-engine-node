<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anchor Search UI Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
    }
    
    .search-ui {
      display: grid;
      grid-template-columns: 1fr 350px;
      height: 100vh;
      gap: 0;
    }
    
    /* Results Panel (Left 2/3) */
    .results-panel {
      background: white;
      border-right: 1px solid #e0e0e0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .results-header {
      padding: 16px 24px;
      border-bottom: 1px solid #e0e0e0;
      background: #fafafa;
    }
    
    .results-stats {
      display: flex;
      gap: 24px;
    }
    
    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    .stat-value {
      font-size: 24px;
      font-weight: 600;
      color: #2196f3;
    }
    
    .stat-label {
      font-size: 12px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .results-grid {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .result-card {
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 16px;
      transition: box-shadow 0.2s;
    }
    
    .result-card:hover {
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    .result-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-size: 12px;
      color: #666;
    }
    
    .result-source {
      font-weight: 500;
      color: #1976d2;
    }
    
    .result-content {
      font-size: 14px;
      line-height: 1.6;
      color: #333;
      white-space: pre-wrap;
    }
    
    .result-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }
    
    .result-tag {
      background: #f5f5f5;
      padding: 4px 12px;
      border-radius: 16px;
      font-size: 12px;
      color: #666;
    }
    
    /* Search Panel (Right 1/3) */
    .search-panel {
      display: flex;
      flex-direction: column;
      padding: 24px;
      gap: 24px;
      overflow-y: auto;
      background: #fafafa;
    }
    
    .search-input-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .search-input {
      width: 100%;
      padding: 12px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      resize: vertical;
      min-height: 80px;
    }
    
    .search-input:focus {
      outline: none;
      border-color: #2196f3;
      box-shadow: 0 0 0 2px rgba(33, 150, 243, 0.1);
    }
    
    .search-button {
      padding: 12px 24px;
      background: #2196f3;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .search-button:hover {
      background: #1976d2;
    }
    
    .search-section {
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      overflow: hidden;
    }
    
    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: #fafafa;
      cursor: pointer;
      user-select: none;
    }
    
    .section-title {
      flex: 1;
      font-weight: 500;
      font-size: 14px;
      color: #333;
    }
    
    .section-count {
      font-size: 12px;
      color: #999;
      background: #f0f0f0;
      padding: 2px 8px;
      border-radius: 10px;
    }
    
    .section-toggle {
      font-size: 12px;
      color: #999;
    }
    
    .bucket-list {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .bucket-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .bucket-item:hover {
      background: #f5f5f5;
    }
    
    .bucket-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }
    
    .bucket-name {
      flex: 1;
      font-size: 14px;
      color: #333;
    }
    
    .tag-list {
      padding: 12px 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    
    .tag-item {
      padding: 6px 14px;
      background: #f5f5f5;
      border: 1px solid #e0e0e0;
      border-radius: 16px;
      font-size: 13px;
      color: #666;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .tag-item:hover {
      background: #e0e0e0;
    }
    
    .tag-item.selected {
      background: #e3f2fd;
      border-color: #2196f3;
      color: #1976d2;
    }
    
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      text-align: center;
      color: #999;
      height: 100%;
    }
    
    @media (max-width: 1024px) {
      .search-ui {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr auto;
      }
    }
  </style>
</head>
<body>
  <div class="search-ui">
    <!-- Results Panel (Left 2/3) -->
    <div class="results-panel">
      <div class="results-header">
        <div class="results-stats">
          <div class="stat">
            <span class="stat-value" id="result-count">0</span>
            <span class="stat-label">results</span>
          </div>
          <div class="stat">
            <span class="stat-value" id="char-count">0</span>
            <span class="stat-label">chars</span>
          </div>
          <div class="stat">
            <span class="stat-value" id="source-count">0</span>
            <span class="stat-label">sources</span>
          </div>
        </div>
      </div>
      
      <div class="results-grid" id="results">
        <div class="empty-state">
          <p>Enter a search query to find relevant context</p>
        </div>
      </div>
    </div>
    
    <!-- Search Panel (Right 1/3) -->
    <div class="search-panel">
      <div class="search-input-container">
        <textarea 
          class="search-input" 
          id="search-query"
          placeholder="Search your knowledge base..."
          rows="3"
        ></textarea>
        <button class="search-button" id="search-btn">Search</button>
      </div>
      
      <!-- Buckets Section -->
      <div class="search-section">
        <div class="section-header" onclick="toggleSection('buckets')">
          <span class="section-title">Buckets</span>
          <span class="section-toggle" id="buckets-toggle">▼</span>
        </div>
        <div class="bucket-list" id="buckets">
          <label class="bucket-item">
            <input type="checkbox" value="Personal" checked onchange="toggleBucket('Personal')">
            <span class="bucket-name">Personal</span>
          </label>
          <label class="bucket-item">
            <input type="checkbox" value="Work" onchange="toggleBucket('Work')">
            <span class="bucket-name">Work</span>
          </label>
          <label class="bucket-item">
            <input type="checkbox" value="Research" onchange="toggleBucket('Research')">
            <span class="bucket-name">Research</span>
          </label>
          <label class="bucket-item">
            <input type="checkbox" value="Notes" onchange="toggleBucket('Notes')">
            <span class="bucket-name">Notes</span>
          </label>
        </div>
      </div>
      
      <!-- Tags Section -->
      <div class="search-section">
        <div class="section-header" onclick="toggleSection('tags')">
          <span class="section-title">Tags</span>
          <span class="section-count">5</span>
          <span class="section-toggle" id="tags-toggle">▼</span>
        </div>
        <div class="tag-list" id="tags">
          <button class="tag-item" onclick="toggleTag('important')">important</button>
          <button class="tag-item" onclick="toggleTag('reference')">reference</button>
          <button class="tag-item" onclick="toggleTag('todo')">todo</button>
          <button class="tag-item" onclick="toggleTag('idea')">idea</button>
          <button class="tag-item" onclick="toggleTag('question')">question</button>
        </div>
      </div>
    </div>
  </div>
  
  <script>
    let selectedBuckets = ['Personal'];
    let selectedTags = [];
    
    function toggleSection(id) {
      const section = document.getElementById(id);
      const toggle = document.getElementById(id + '-toggle');
      if (section.style.display === 'none') {
        section.style.display = 'flex';
        toggle.textContent = '▼';
      } else {
        section.style.display = 'none';
        toggle.textContent = '▶';
      }
    }
    
    function toggleBucket(bucket) {
      const index = selectedBuckets.indexOf(bucket);
      if (index > -1) {
        selectedBuckets = selectedBuckets.filter(b => b !== bucket);
      } else {
        selectedBuckets.push(bucket);
      }
      console.log('Selected buckets:', selectedBuckets);
    }
    
    function toggleTag(tag) {
      const element = event.target;
      const index = selectedTags.indexOf(tag);
      
      if (index > -1) {
        selectedTags = selectedTags.filter(t => t !== tag);
        element.classList.remove('selected');
      } else {
        selectedTags.push(tag);
        element.classList.add('selected');
      }
      console.log('Selected tags:', selectedTags);
    }
    
    // Demo search results
    const demoResults = [
      {
        id: '1',
        source: 'mirrored_brain/@inbox/project-alpha/notes.md',
        content: 'Quantum computing leverages quantum mechanical phenomena such as superposition and entanglement to perform computations. Unlike classical computers that use bits (0 or 1), quantum computers use qubits that can exist in multiple states simultaneously.',
        tags: ['reference', 'important']
      },
      {
        id: '2',
        source: 'mirrored_brain/@inbox/research/quantum-algorithms.md',
        content: "Shor's algorithm demonstrates that quantum computers could factor large integers exponentially faster than the best known classical algorithms. This has significant implications for cryptography, particularly RSA encryption.",
        tags: ['research', 'important']
      },
      {
        id: '3',
        source: 'mirrored_brain/@inbox/notes/meeting-notes-2024.md',
        content: 'Discussion points:\n- Quantum error correction remains a significant challenge\n- Need to explore topological qubits for better stability\n- Timeline for practical quantum advantage still uncertain',
        tags: ['todo', 'idea']
      }
    ];
    
    document.getElementById('search-btn').addEventListener('click', performSearch);
    document.getElementById('search-query').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        performSearch();
      }
    });
    
    function performSearch() {
      const query = document.getElementById('search-query').value;
      if (!query.trim()) return;
      
      // Show loading
      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = '<div class="empty-state"><p>Searching...</p></div>';
      
      // Simulate search delay
      setTimeout(() => {
        displayResults(demoResults);
      }, 500);
    }
    
    function displayResults(results) {
      const resultsDiv = document.getElementById('results');
      const resultCount = document.getElementById('result-count');
      const charCount = document.getElementById('char-count');
      const sourceCount = document.getElementById('source-count');
      
      resultCount.textContent = results.length;
      charCount.textContent = (results.reduce((sum, r) => sum + r.content.length, 0) / 1000).toFixed(1) + 'k';
      sourceCount.textContent = new Set(results.map(r => r.source)).size;
      
      resultsDiv.innerHTML = results.map(r => `
        <div class="result-card">
          <div class="result-meta">
            <span class="result-source">${r.source.split('/').pop()}</span>
          </div>
          <div class="result-content">${r.content}</div>
          <div class="result-tags">
            ${r.tags.map(t => `<span class="result-tag">${t}</span>`).join('')}
          </div>
        </div>
      `).join('');
    }
  </script>
</body>
</html>
