<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anchor Search - C++ FFI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    #app { height: 100vh; }
    .loading-app {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-size: 18px;
      color: #666;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading-app">Loading Anchor Search...</div>
  </div>
  
  <script type="module">
    import { render } from 'solid-js/web';
    import { SearchPage } from './src/ui/search-page.tsx';
    
    render(() => <SearchPage 
      initialBuckets={['Personal']}
      availableBuckets={['Personal', 'Work', 'Research', 'Notes', 'Archive']}
      availableTags={['important', 'reference', 'todo', 'idea', 'question']}
    />, document.getElementById('app'));
  </script>
</body>
</html>
