blem: Static File Routing Broke Why It Happened The old site had hardcoded file paths (e.g., /images/photo.jpg ). Next.js uses a different structure ( /public/photo.jpg ). Solution: Path Mapping in Nginx We added rules to redirect legacy paths: nginx location /images/ { alias /var/www/prrc/public/; } Additional Fixes Audited all internal links to use Next.js’s /public folder. Added 301 redirects for old PDF paths. 4. Problem: Caching Caused Stale Content Why It Happened IIS aggressively cached HTML files, preventing updates from appearing. Docker containers also had their own caching layers. Solution: Forced Cache Busting 1. Added version hashes to static files (e.g., styles.css?v=123 ). 2. Configured IIS to ignore cache for / and /api routes: xml 5. Problem: Cold Starts Slowed Down the Site Why It Happened Docker containers shut down after inactivity to save resources. The first visitor after idle time faced a 5–10 second delay while containers booted. Solution: Keep-Alive Scheduling 1. Added a cron job to ping the site hourly: bash curl -s https://www.prrc.nmt.edu > /dev/null 2. Adjusted Docker’s restart policy to always. Result Reduced cold starts to under 1 second. Summary of Fixes Issue Solution Outcome Port 80 conflict Nginx reverse proxy on port 8080 No IIS interference Issue Solution Outcome SSL errors Let IIS handle HTTPS Secure, certificate-compliant traffic Broken file paths Nginx path mapping Old links still work Caching problems Cache-busting & IIS rules Updates appear immediately Slow cold starts Cron job keep-alive pings Consistent performance This is the context I need you to understand for this chat. I'm having trouble with the server. The server shut down unexpectedly and restarted. Because of this, the website went down. I had to restart the docker engine and it appears to be running now, but I'm still not getting the website. Instead, it is giving me a 502.3 bad gateway error on the browser. How do I start to fix this?...
