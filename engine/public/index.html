                                        />
                                        <p className="text-xs text-gray-500 mt-2">
                                            ⚠️ <strong>Store this password safely!</strong> If lost, encrypted content cannot be recovered.
                                            We recommend using a password manager.
                                        </p>
                                        <div className="mt-3 flex gap-2">
                                            <button
                                                onClick={async () => {
                                                    const passwordInput = document.getElementById('encryption-master-password');
                                                    const password = passwordInput?.value;
                                                    if (!password || password.length < 12) {
                                                        alert('Password must be at least 12 characters for security');
                                                        return;
                                                    }
                                                    
                                                    try {
                                                        // Set password temporarily (cached in memory for 5 min)
                                                        const res = await fetch('/v1/encryption/set-password', {
                                                            method: 'POST',
                                                            headers: {
                                                                'Content-Type': 'application/json',
                                                                'Authorization': `Bearer ${API_KEY}`
                                                            },
                                                            body: JSON.stringify({ password, validate: true })
                                                        });
                                                        
                                                        const data = await res.json();
                                                        if (res.ok) {
                                                            alert('✅ Password set! It will be cached for 5 minutes.\n\nSet ANCHOR_MASTER_PASSWORD environment variable for permanent storage.');
                                                            passwordInput.value = '';
                                                            updateSetting('encryption', 'password_set', true);
                                                        } else {
                                                            alert('❌ ' + (data.error || 'Failed to set password'));
                                                        }
                                                    } catch (error) {
                                                        alert('❌ ' + error.message);
                                                    }
                                                }}
                                                className="px-4 py-2 bg-pink-500/20 text-pink-400 border border-pink-500/30 rounded-lg hover:bg-pink-500/30 transition-colors text-sm font-medium"
                                            >
                                                Set Password (Temporary)
                                            </button>
                                            <button
                                                onClick={() => {
                                                    const password = prompt('Enter master password to clear from cache:');
                                                    if (password) {
                                                        // Just clear the cached password
                                                        fetch('/v1/encryption/clear-password', {
                                                            method: 'POST',
                                                            headers: { 'Authorization': `Bearer ${API_KEY}` }
                                                        });
                                                        alert('✅ Password cleared from memory');
                                                    }
                                                }}
                                                className="px-4 py-2 bg-red-500/20 text-red-400 border border-red-500/30 rounded-lg hover:bg-red-500/30 transition-colors text-sm font-medium"
                                            >
                                                Clear from Memory
                                            </button>
                                        </div>
                                    </div>
                                )}

                                {/* Encryption Stats */}
                                {settings?.encryption?.enabled && (
                                    <div className="p-4 bg-white/5 rounded-lg">
                                        <p className="text-sm font-medium mb-2">Encryption Status</p>
                                        <div className="grid grid-cols-2 gap-3 text-xs">
                                            <div>
                                                <span className="text-gray-500">Auto-encrypt on ingest:</span>
                                                <span className="text-pink-400 ml-2">Yes</span>
                                            </div>
                                            <div>
                                                <span className="text-gray-500">Auto-decrypt on search:</span>
                                                <span className="text-pink-400 ml-2">Yes</span>
                                            </div>
                                            <div>
                                                <span className="text-gray-500">NSFW detection:</span>
                                                <span className={settings?.encryption?.detect_nsfw ? 'text-pink-400' : 'text-gray-500'}>
                                                    {settings?.encryption?.detect_nsfw ? 'Enabled' : 'Disabled'}
                                                </span>
                                            </div>
                                            <div>
                                                <span className="text-gray-500">Min confidence:</span>
                                                <span className="text-pink-400 ml-2">{(settings?.encryption?.min_confidence || 0.7) * 100}%</span>
                                            </div>
                                        </div>
                                        <p className="text-xs text-gray-500 mt-3">
                                            💡 <strong>Tip:</strong> Encryption protects sensitive content from LLM content filters while preserving your ability to search and view it.
                                        </p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // Stats Bar Component
        const StatsBar = ({ stats }) => {
            if (!stats) return null;
            return (
                <div className="bg-black/40 border-b border-white/10 px-4 sm:px-6 py-2">
                    <div className="flex flex-wrap gap-3 sm:gap-6 items-center justify-center text-xs">
                        <div className="flex items-center gap-2">
                            <i data-lucide="database" className="text-cyan-400 flex-shrink-0" width="14" height="14"></i>
                            <span className="text-gray-400 whitespace-nowrap">Atoms:</span>
                            <span className="text-cyan-400 font-mono font-semibold">{stats.atoms?.toLocaleString() || 0}</span>
                        </div>
                        <div className="flex items-center gap-2">
                            <i data-lucide="molecule" className="text-purple-400 flex-shrink-0" width="14" height="14"></i>
                            <span className="text-gray-400 whitespace-nowrap">Molecules:</span>
                            <span className="text-purple-400 font-mono font-semibold">{stats.molecules?.toLocaleString() || 0}</span>
                        </div>
                        <div className="flex items-center gap-2">
                            <i data-lucide="tag" className="text-amber-400 flex-shrink-0" width="14" height="14"></i>
                            <span className="text-gray-400 whitespace-nowrap">Tags:</span>
                            <span className="text-amber-400 font-mono font-semibold">{stats.tags?.toLocaleString() || 0}</span>
                        </div>
                        <div className="flex items-center gap-2">
                            <i data-lucide="file-text" className="text-green-400 flex-shrink-0" width="14" height="14"></i>
                            <span className="text-gray-400 whitespace-nowrap">Sources:</span>
                            <span className="text-green-400 font-mono font-semibold">{stats.sources?.toLocaleString() || 0}</span>
                        </div>
                    </div>
                </div>
            );
        };

        // Distill Test Page - A/B Testing Diagnostic
        const DistillTestPage = () => {
            const [testResult, setTestResult] = useState(null);
            const [loading, setLoading] = useState(false);
            const [tag, setTag] = useState('#STAR');
            const [error, setError] = useState('');

            const runTest = async () => {
                setLoading(true);
                setError('');
                try {
                    const API_KEY = localStorage.getItem('anchor_api_key') || 'anchor-engine-default-key';
                    const res = await fetch(`/v1/distill/test?tag=${encodeURIComponent(tag)}`, {
                        headers: { 'Authorization': `Bearer ${API_KEY}` }
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || 'Test failed');
                    setTestResult(data);
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="space-y-6">
                    <div className="glass-panel p-6">
                        <h2 className="text-2xl font-bold mb-4 flex items-center gap-2 text-cyan-400">
                            <i data-lucide="flask-conical"></i>
                            Distill A/B Test
                        </h2>
                        <p className="text-gray-400 mb-6">
                            Diagnostic tool to verify which data source contains tag data: tags table vs atoms.tags[] array
                        </p>

                        <div className="flex gap-4 mb-6">
                            <input
                                type="text"
                                value={tag}
                                onChange={(e) => setTag(e.target.value)}
                                placeholder="Tag to test (e.g., #STAR)"
                                className="flex-1 bg-white/10 border border-white/20 rounded-lg px-4 py-2 text-white placeholder-gray-500 focus:outline-none focus:border-cyan-500"
                            />
                            <button
                                onClick={runTest}
                                disabled={loading}
                                className="btn-primary whitespace-nowrap"
                            >
                                {loading ? 'Testing...' : 'Run Test'}
                            </button>
                        </div>

                        {error && (
                            <div className="bg-red-500/20 border border-red-500/50 rounded-lg p-4 text-red-400">
                                ❌ {error}
                            </div>
                        )}

                        {testResult && (
                            <div className="space-y-4">
                                {/* Database Stats */}
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-white/5 rounded-lg p-4">
                                        <p className="text-gray-400 text-sm">Total Atoms</p>
                                        <p className="text-2xl font-bold text-cyan-400">{testResult.database.total_atoms.toLocaleString()}</p>
                                    </div>
                                    <div className="bg-white/5 rounded-lg p-4">
                                        <p className="text-gray-400 text-sm">Unique Tags</p>
                                        <p className="text-2xl font-bold text-purple-400">{testResult.database.unique_tags.toLocaleString()}</p>
                                    </div>
                                </div>

                                {/* A/B Test Results */}
                                <div className="bg-white/5 rounded-lg p-4">
                                    <h3 className="font-bold mb-3 text-yellow-400">A/B Test Results for "{tag}"</h3>
                                    <div className="grid grid-cols-2 gap-4 mb-4">
                                        <div className="bg-purple-500/10 rounded-lg p-3 border border-purple-500/30">
                                            <p className="text-purple-400 text-sm">Source A: tags table</p>
                                            <p className="text-xl font-bold">{testResult.ab_test.source_a_tags_table}</p>
                                        </div>
                                        <div className={`rounded-lg p-3 border ${testResult.ab_test.winner === 'atoms.tags[]' ? 'bg-green-500/10 border-green-500/30' : 'bg-white/5 border-white/20'}`}>
                                            <p className={`${testResult.ab_test.winner === 'atoms.tags[]' ? 'text-green-400' : 'text-gray-400'} text-sm`}>Source B: atoms.tags[]</p>
                                            <p className="text-xl font-bold">{testResult.ab_test.source_b_atoms_tags_array}</p>
                                        </div>
                                    </div>
                                    <div className={`rounded-lg p-3 ${testResult.ab_test.winner === 'neither' ? 'bg-red-500/20' : 'bg-green-500/20'}`}>
                                        <p className={`font-medium ${testResult.ab_test.winner === 'neither' ? 'text-red-400' : 'text-green-400'}`}>
                                            🏆 Winner: {testResult.ab_test.winner}
                                        </p>
                                        <p className="text-sm text-gray-400 mt-1">{testResult.recommendation}</p>
                                    </div>
                                </div>

                                {/* Sample Atoms */}
                                {testResult.sample_atoms && testResult.sample_atoms.length > 0 && (
                                    <div className="bg-white/5 rounded-lg p-4">
                                        <h3 className="font-bold mb-3 text-cyan-400">Sample Atoms (with content)</h3>
                                        <div className="space-y-3">
                                            {testResult.sample_atoms.map((atom, i) => (
                                                <div key={i} className="bg-black/30 rounded-lg p-3 text-sm">
                                                    <div className="flex items-center justify-between mb-2">
                                                        <span className="text-cyan-400 font-mono text-xs">{atom.id.substring(0, 12)}...</span>
                                                        <span className={`text-xs px-2 py-0.5 rounded ${atom.has_content ? 'bg-green-500/20 text-green-400' : 'bg-red-500/20 text-red-400'}`}>
                                                            {atom.has_content ? '✅ Has content' : '❌ No content'} ({atom.content_length} chars)
                                                        </span>
                                                    </div>
                                                    <p className="text-gray-500 text-xs truncate">{atom.source}</p>
                                                    <p className="text-purple-400 text-xs mt-1">{atom.tags?.slice(0, 5).join(' ')}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {/* Duration */}
                                <p className="text-xs text-gray-500 text-center">Test completed in {testResult.duration_ms}ms</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // Main App
        const App = () => {
            const { route, navigate } = useRouter();
            const [isLoading, setIsLoading] = useState(true);
            const [showResearch, setShowResearch] = useState(false);
            const [showGithub, setShowGithub] = useState(false);
            const [systemStatus, setSystemStatus] = useState({ isBusy: false, state: 'idle' });
            const [isDbEmpty, setIsDbEmpty] = useState(true);
            const [stats, setStats] = useState({ atoms: 0, molecules: 0, tags: 0, sources: 0 });
            const [isDrawerOpen, setIsDrawerOpen] = useState(false);

            // Adaptive polling: 3s when ingesting, 30s when idle
            useEffect(() => {
                let intervalId = null;

                const fetchAll = async () => {
                    try {
                        const statusRes = await fetch('/v1/system/status', {
                            headers: { 'Authorization': `Bearer ${API_KEY}` }
                        });
                        if (statusRes.ok) {
                            const statusData = await statusRes.json();
                            setSystemStatus(prev => {
                                // Re-schedule when busy state changes
                                if ((prev.isBusy) !== (statusData.isBusy)) {
                                    clearInterval(intervalId);
                                    intervalId = setInterval(fetchAll, statusData.isBusy ? 1000 : 30000);
                                }
                                return statusData;
                            });
                        }

                        // Stats only need to refresh occasionally
                        const statsRes = await fetch('/v1/stats', {
                            headers: { 'Authorization': `Bearer ${API_KEY}` }
                        });
                        if (statsRes.ok) {
                            const statsData = await statsRes.json();
                            setStats(statsData);
                            setIsDbEmpty(!statsData.atoms && !statsData.molecules);
                        }
                    } catch (error) {
                        // Silently fail - will retry on next interval
                    }
                };

                fetchAll(); // Initial fetch
                intervalId = setInterval(fetchAll, 30000); // Start at idle rate
                return () => clearInterval(intervalId);
            }, []);

            useEffect(() => {
                const checkReady = async () => {
                    try {
                        const health = await api.health();
                        // Accept healthy, degraded, or starting status
                        if (health.status === 'healthy' || health.status === 'degraded' || health.status === 'starting') {
                            setIsLoading(false);
                        }
                    } catch (error) {
                        console.log('Waiting for system...');
                    }
                };
                checkReady();
                const interval = setInterval(checkReady, 2000);
                return () => clearInterval(interval);
            }, []);

            useEffect(() => {
                setTimeout(() => { try { lucide?.createIcons(); } catch(e) {} }, 100);
            }, [route, showResearch, showGithub, isDrawerOpen]);

            if (isLoading) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center">
                        <div className="w-12 h-12 border-4 border-cyan-500/30 border-t-cyan-500 rounded-full animate-spin mb-4"></div>
                        <h1 className="text-xl font-semibold bg-gradient-to-r from-cyan-400 to-purple-400 bg-clip-text text-transparent">
                            Anchor Engine
                        </h1>
                        <p className="text-gray-500 mt-2">Initializing...</p>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col">
                    <Header
                        route={route}
                        navigate={navigate}
                        onOpenResearch={() => setShowResearch(true)}
                        onOpenGithub={() => setShowGithub(true)}
                        systemStatus={systemStatus}
                        isDbEmpty={isDbEmpty}
                    />
                    <MobileHeader
                        route={route}
                        navigate={navigate}
                        onOpenResearch={() => setShowResearch(true)}
                        onOpenGithub={() => setShowGithub(true)}
                        systemStatus={systemStatus}
                        isDbEmpty={isDbEmpty}
                        onMenuClick={() => setIsDrawerOpen(true)}
                    />
                    <StatsBar stats={stats} />
                    <MobileDrawer
                        isOpen={isDrawerOpen}
                        onClose={() => setIsDrawerOpen(false)}
                        route={route}
                        navigate={navigate}
                        onOpenGithub={() => setShowGithub(true)}
                        onOpenResearch={() => setShowResearch(true)}
                    />
                    <main className="flex-1 overflow-hidden">
                        {route === '/search' && <SearchPage />}
                        {route === '/paths' && <PathsPage />}
                        {route === '/quarantine' && <QuarantinePage navigate={navigate} />}
                        {route === '/settings' && <SettingsPage navigate={navigate} />}
                        {route === '/distill-test' && <DistillTestPage />}
                        {route === '/' && <SearchPage />}
                    </main>

                    {/* Modals */}
                    {showResearch && <ResearchModal onClose={() => setShowResearch(false)} />}
                    {showGithub && <GithubModal onClose={() => setShowGithub(false)} />}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
