<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anchor Engine</title>
    <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.26.0/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-primary: #000000;
            --bg-secondary: #0a0a0f;
            --accent-primary: #6366f1;
            --accent-secondary: #8b5cf6;
            --accent-cyan: #06b6d4;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --border-subtle: rgba(148, 163, 184, 0.1);
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            margin: 0;
            min-height: 100vh;
        }
        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(99, 102, 241, 0.4);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.3);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 10px;
        }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.25); }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // Router
        const useRouter = () => {
            const [route, setRoute] = useState(window.location.pathname);
            useEffect(() => {
                const onPopState = () => setRoute(window.location.pathname);
                window.addEventListener('popstate', onPopState);
                return () => window.removeEventListener('popstate', onPopState);
            }, []);
            const navigate = (path) => {
                window.history.pushState({}, '', path);
                setRoute(path);
                setTimeout(() => lucide.createIcons(), 50);
            };
            return { route, navigate };
        };

        // API
        const api = {
            search: async (params) => {
                const res = await fetch('/v1/memory/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(params)
                });
                return res.json();
            },
            getBuckets: () => fetch('/v1/buckets').then(r => r.json()),
            getTags: (buckets) => {
                const query = buckets && buckets.length > 0 ? `?buckets=${buckets.join(',')}` : '';
                return fetch(`/v1/tags${query}`).then(r => r.json());
            },
            getPaths: () => fetch('/v1/system/paths').then(r => r.json()),
            addPath: (path) => fetch('/v1/system/paths', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ path })
            }).then(r => r.json()),
            removePath: (path) => fetch(`/v1/system/paths`, {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ path })
            }).then(r => r.json()),
            health: () => fetch('/health').then(r => r.json()),
            getStats: () => fetch('/v1/stats').then(r => r.json()).catch(() => ({ atoms: 0, molecules: 0 }))
        };

        // Header Component
        const Header = ({ route, navigate, onOpenGithub, onOpenResearch, systemStatus, isDbEmpty }) => {
            const isIngesting = systemStatus?.isBusy;
            const statusMessage = systemStatus?.activeTask || '';
            return (
            <header className="flex items-center justify-between px-6 py-3 border-b border-white/10 bg-black/20">
                <div className="flex items-center gap-3">
                    <div className="w-9 h-9 rounded-lg bg-gradient-to-br from-cyan-500 to-purple-600 flex items-center justify-center">
                        <i data-lucide="anchor" className="text-white" width="20" height="20"></i>
                    </div>
                    <div>
                        <h1 className="text-lg font-semibold bg-gradient-to-r from-cyan-400 to-purple-400 bg-clip-text text-transparent">
                            Anchor Engine
                        </h1>
                        <p className="text-xs text-gray-500 font-mono">v4.3</p>
                    </div>
                    {isDbEmpty && (
                        <div className="ml-4 flex items-center gap-2 px-3 py-1.5 rounded-full bg-red-500/10 border border-red-500/30">
                            <div className="w-2 h-2 rounded-full bg-red-400 animate-pulse"></div>
                            <span className="text-xs text-red-400 font-medium">⚠️ Database Empty</span>
                        </div>
                    )}
                    {isIngesting && (
                        <div className="ml-4 flex items-center gap-2 px-3 py-1.5 rounded-full bg-amber-500/10 border border-amber-500/30">
                            <div className="w-2 h-2 rounded-full bg-amber-400 animate-pulse"></div>
                            <span className="text-xs text-amber-400 font-medium">⏳ {statusMessage || 'Processing files...'}</span>
                        </div>
                    )}
                </div>
                <div className="flex items-center gap-3">
                    {/* Utility Buttons */}
                    <button
                        onClick={onOpenResearch}
                        className="p-2 rounded-lg hover:bg-white/5 transition-colors text-gray-400 hover:text-purple-400"
                        title="Web Research"
                    >
                        <i data-lucide="globe" width="18"></i>
                    </button>
                    <button
                        onClick={onOpenGithub}
                        className="p-2 rounded-lg hover:bg-white/5 transition-colors text-gray-400 hover:text-green-400"
                        title="GitHub Ingestion"
                    >
                        <i data-lucide="github" width="18"></i>
                    </button>
                    <button
                        onClick={() => navigate('/quarantine')}
                        className="p-2 rounded-lg hover:bg-white/5 transition-colors text-gray-400 hover:text-red-400"
                        title="Quarantine"
                    >
                        <i data-lucide="shield-alert" width="18"></i>
                    </button>
                    <button
                        onClick={() => navigate('/settings')}
                        className="p-2 rounded-lg hover:bg-white/5 transition-colors text-gray-400 hover:text-cyan-400"
                        title="Settings"
                    >
                        <i data-lucide="settings" width="18"></i>
                    </button>
                    <div className="w-px h-6 bg-white/10 mx-1"></div>
                    {/* Nav Buttons */}
                    <button
                        onClick={() => navigate('/search')}
                        className={`px-4 py-2 rounded-lg text-sm font-medium transition-all ${
                            route === '/search' 
                                ? 'bg-cyan-600/20 text-cyan-400 border border-cyan-500/30' 
                                : 'text-gray-400 hover:text-white hover:bg-white/5'
                        }`}
                    >
                        <span className="flex items-center gap-2">
                            <i data-lucide="search" width="16"></i>
                            Search
                        </span>
                    </button>
                    <button
                        onClick={() => navigate('/paths')}
                        className={`px-4 py-2 rounded-lg text-sm font-medium transition-all ${
                            route === '/paths' 
                                ? 'bg-purple-600/20 text-purple-400 border border-purple-500/30' 
                                : 'text-gray-400 hover:text-white hover:bg-white/5'
                        }`}
                    >
                        <span className="flex items-center gap-2">
                            <i data-lucide="folder" width="16"></i>
                            Paths
                        </span>
                    </button>
                </div>
            </header>
        );
        };

        // Search Page
        const SearchPage = () => {
            const [query, setQuery] = useState('');
            const [results, setResults] = useState([]);
            const [loading, setLoading] = useState(false);
            const [buckets, setBuckets] = useState([]);
            const [selectedBuckets, setSelectedBuckets] = useState([]);
            const [tokenBudget, setTokenBudget] = useState(4096);
            const [copyFeedback, setCopyFeedback] = useState('');

            // Token budget presets with finer granularity at lower values
            const tokenPresets = [
                512, 768, 1024, 1536, 2048, 3072, 4096, 6144, 8192, 
                12288, 16384, 24576, 32768, 49152, 65536, 
                98304, 131072, 196608, 262144, 393216, 524288, 786432, 1048576
            ];

            useEffect(() => {
                api.getBuckets().then(setBuckets).catch(() => setBuckets([]));
                setTimeout(() => lucide.createIcons(), 100);
            }, []);

            const handleSearch = async () => {
                if (!query.trim()) return;
                setLoading(true);
                setResults([]);
                try {
                    const data = await api.search({
                        query,
                        max_chars: tokenBudget * 4,
                        token_budget: tokenBudget,
                        provenance: 'all',
                        buckets: selectedBuckets.length > 0 ? selectedBuckets : undefined
                    });
                    setResults(data.results || []);
                } catch (error) {
                    setResults([{ id: 'error', content: `Search failed: ${error.message}`, source: 'System', score: 0 }]);
                } finally {
                    setLoading(false);
                }
            };

            const toggleBucket = (bucket) => {
                setSelectedBuckets(prev => 
                    prev.includes(bucket) ? prev.filter(b => b !== bucket) : [...prev, bucket]
                );
            };

            // Get current preset index
            const getTokenPresetIndex = (value) => {
                return tokenPresets.findIndex(preset => preset >= value);
            };

            // Handle slider change with preset snapping
            const handleTokenSliderChange = (e) => {
                const index = parseInt(e.target.value);
                setTokenBudget(tokenPresets[index]);
            };

            const copyResultsAsYaml = async (resultsToCopy) => {
                if (!resultsToCopy || resultsToCopy.length === 0) return;

                // Total YAML clipboard budget: ~60K chars (~15K tokens) — safe for LLM pasting.
                // Molecules can be up to 100KB each (search-utils MAX_SNIPPET_BYTES), so we must
                // budget across results rather than per-result.  Distribute evenly across up to 20
                // results; any single result may use its full per-result allotment.
                const MAX_RESULTS = 20;
                const TOTAL_CHAR_BUDGET = 60_000;
                const capped = resultsToCopy.slice(0, MAX_RESULTS);
                const perResultBudget = Math.floor(TOTAL_CHAR_BUDGET / capped.length);

                try {
                    // Convert to YAML format (more compact than JSON)
                    const yamlContent = capped.map((result, index) => {
                        const rawContent = result.content || '';
                        const preview = rawContent.length > perResultBudget
                            ? rawContent.slice(0, perResultBudget) + '…'
                            : rawContent;

                        const lines = [
                            `- id: "${result.id || index}"`,
                            `  source: "${(result.source || '').replace(/\\/g, '/').replace(/"/g, '\\"')}"`,
                            `  score: ${result.score?.toFixed(4) || 0}`,
                            `  content: |`
                        ];

                        preview.split('\n').forEach(line => {
                            lines.push(`    ${line}`);
                        });

                        if (result.tags && result.tags.length > 0) {
                            lines.push(`  tags:`);
                            result.tags.forEach(tag => {
                                lines.push(`    - "${tag}"`);
                            });
                        }

                        if (result.buckets && result.buckets.length > 0) {
                            lines.push(`  buckets:`);
                            result.buckets.forEach(bucket => {
                                lines.push(`    - "${bucket}"`);
                            });
                        }

                        return lines.join('\n');
                    }).join('\n\n');

                    const totalChar = yamlContent.length;
                    const truncNote = resultsToCopy.length > MAX_RESULTS
                        ? `\n# (showing ${MAX_RESULTS} of ${resultsToCopy.length} results; ~${perResultBudget} chars/result, ${TOTAL_CHAR_BUDGET} total budget)`
                        : `\n# (${capped.length} results; ~${perResultBudget} chars/result, ${TOTAL_CHAR_BUDGET} total budget)`;

                    await navigator.clipboard.writeText(yamlContent + truncNote);
                    setCopyFeedback(`✅ Copied! (~${Math.round(totalChar/1024)}KB)`);
                    setTimeout(() => setCopyFeedback(''), 3000);
                } catch (error) {
                    setCopyFeedback('❌ Copy failed');
                    setTimeout(() => setCopyFeedback(''), 2000);
                    console.error('Failed to copy:', error);
                }
            };

            return (
                <div className="flex-1 flex flex-col overflow-hidden">
                    {/* Search Bar */}
                    <div className="p-4 border-b border-white/10 space-y-3">
                        <div className="flex gap-2">
                            <input
                                type="text"
                                value={query}
                                onChange={(e) => setQuery(e.target.value)}
                                onKeyDown={(e) => e.key === 'Enter' && handleSearch()}
                                placeholder="Search your memory..."
                                className="flex-1 bg-white/5 border border-white/10 rounded-lg px-4 py-2.5 focus:border-cyan-500/50 outline-none transition-colors"
                            />
                            <button onClick={handleSearch} disabled={loading} className="btn-primary min-w-[100px]">
                                {loading ? 'Searching...' : 'Search'}
                            </button>
                        </div>
                        
                        {/* Filters */}
                        <div className="flex items-center gap-4 w-full px-4">
                            <div className="flex items-center gap-2 text-sm min-w-[200px]">
                                <i data-lucide="coins" width="14" className="text-cyan-400"></i>
                                <span className="text-gray-400">Token budget:</span>
                                <span className="text-cyan-400 font-mono font-bold">{tokenBudget.toLocaleString()}</span>
                                <span className="text-gray-500 text-xs">(~{(tokenBudget * 4).toLocaleString()} chars)</span>
                            </div>
                            <input
                                type="range"
                                min="0"
                                max={tokenPresets.length - 1}
                                step="1"
                                value={getTokenPresetIndex(tokenBudget)}
                                onChange={handleTokenSliderChange}
                                className="flex-1 accent-cyan-500 h-2 rounded-lg appearance-none cursor-pointer bg-white/5"
                                style={{
                                    background: `linear-gradient(to right, #06b6d4 0%, #06b6d4 ${(getTokenPresetIndex(tokenBudget) / (tokenPresets.length - 1)) * 100}%, rgba(255,255,255,0.1) ${(getTokenPresetIndex(tokenBudget) / (tokenPresets.length - 1)) * 100}%, rgba(255,255,255,0.1) 100%)`
                                }}
                            />
                        </div>
                        
                        {/* Slider scale markers */}
                        <div className="flex justify-between px-4 text-xs text-gray-600 font-mono">
                            <span>512</span>
                            <span>4K</span>
                            <span>16K</span>
                            <span>65K</span>
                            <span>262K</span>
                            <span>1M</span>
                        </div>
                        
                        {/* Bucket Filters */}
                        {buckets.length > 0 && (
                            <div className="flex items-center gap-2 flex-wrap">
                                <span className="text-sm text-gray-400">Buckets:</span>
                                {buckets.map(bucket => (
                                    <button
                                        key={bucket}
                                        onClick={() => toggleBucket(bucket)}
                                        className={`px-3 py-1 rounded-full text-xs font-medium transition-all ${
                                            selectedBuckets.includes(bucket)
                                                ? 'bg-purple-600/30 text-purple-300 border border-purple-500/50'
                                                : 'bg-white/5 text-gray-400 border border-white/10 hover:border-white/30'
                                        }`}
                                    >
                                        {bucket}
                                    </button>
                                ))}
                                {selectedBuckets.length > 0 && (
                                    <button
                                        onClick={() => setSelectedBuckets([])}
                                        className="text-xs text-gray-500 hover:text-gray-300 underline"
                                    >
                                        Clear
                                    </button>
                                )}
                            </div>
                        )}
                    </div>

                    {/* Results Header */}
                    <div className="flex items-center justify-between px-4 py-2 border-b border-white/10">
                        <span className="text-sm text-gray-400">
                            {results.length} result{results.length !== 1 ? 's' : ''}
                        </span>
                        <div className="flex items-center gap-3">
                            {copyFeedback && (
                                <span className="text-xs text-green-400">{copyFeedback}</span>
                            )}
                            <button
                                onClick={() => copyResultsAsYaml(results)}
                                className="text-xs px-3 py-1.5 rounded-lg bg-white/5 hover:bg-white/10 border border-white/10 text-gray-300 transition-colors flex items-center gap-2"
                            >
                                <i data-lucide="copy" width="14"></i>
                                Copy as YAML
                            </button>
                        </div>
                    </div>

                    {/* Results */}
                    <div className="flex-1 overflow-y-auto p-4">
                        {!loading && results.length === 0 && (
                            <div className="text-center text-gray-500 mt-20">
                                <i data-lucide="search" className="mx-auto mb-4 opacity-30" width="48"></i>
                                <p>Enter a query to search your memory</p>
                            </div>
                        )}
                        {loading && (
                            <div className="text-center text-gray-400 mt-20">
                                <div className="w-8 h-8 border-2 border-cyan-500/30 border-t-cyan-500 rounded-full animate-spin mx-auto mb-4"></div>
                                <p>Searching...</p>
                            </div>
                        )}
                        {results.length > 0 && (
                            <div className="space-y-3 fade-in">
                                {results.map((result, i) => (
                                    <div key={result.id || i} className="glass-panel p-4 hover:bg-white/5 transition-colors">
                                        <div className="flex items-start justify-between gap-4 mb-2">
                                            <div className="flex items-center gap-2 text-xs text-gray-500">
                                                <i data-lucide="file-text" width="12"></i>
                                                <span className="font-mono truncate max-w-md">{result.source || 'Unknown'}</span>
                                            </div>
                                            <span className="text-xs text-cyan-400 font-mono" title="FTS relevance score (higher = better match)">
                                                {(result.score * 100).toFixed(0)}%
                                            </span>
                                        </div>
                                        <p className="text-sm text-gray-300 whitespace-pre-wrap leading-relaxed">
                                            {result.content}
                                        </p>
                                        {result.tags && result.tags.length > 0 && (
                                            <div className="flex items-center gap-2 mt-3 flex-wrap">
                                                {result.tags.slice(0, 5).map((tag, j) => (
                                                    <span key={j} className="text-xs px-2 py-0.5 rounded bg-white/5 text-gray-400">
                                                        #{tag}
                                                    </span>
                                                ))}
                                                {result.tags.length > 5 && (
                                                    <span className="text-xs text-gray-600">+{result.tags.length - 5} more</span>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // Paths Page
        const PathsPage = () => {
            const [paths, setPaths] = useState([]);
            const [newPath, setNewPath] = useState('');
            const [loading, setLoading] = useState(false);
            const [message, setMessage] = useState('');

            const loadPaths = async () => {
                try {
                    const data = await api.getPaths();
                    setPaths(data.paths || data || []);
                } catch (error) {
                    console.error('Failed to load paths:', error);
                }
            };

            useEffect(() => {
                loadPaths();
                setTimeout(() => lucide.createIcons(), 100);
            }, []);

            const handleAddPath = async () => {
                if (!newPath.trim()) return;
                setLoading(true);
                setMessage('');
                try {
                    await api.addPath(newPath.trim());
                    setNewPath('');
                    setMessage('✅ Path added successfully');
                    loadPaths();
                } catch (error) {
                    setMessage('❌ Failed to add path: ' + error.message);
                } finally {
                    setLoading(false);
                    setTimeout(() => setMessage(''), 3000);
                }
            };

            const handleRemovePath = async (pathToRemove) => {
                setLoading(true);
                try {
                    await api.removePath(pathToRemove);
                    setMessage('✅ Path removed');
                    loadPaths();
                } catch (error) {
                    setMessage('❌ Failed to remove: ' + error.message);
                } finally {
                    setLoading(false);
                    setTimeout(() => setMessage(''), 3000);
                }
            };

            return (
                <div className="flex-1 p-6 overflow-y-auto">
                    <div className="max-w-3xl mx-auto">
                        <h2 className="text-2xl font-bold mb-6 flex items-center gap-3">
                            <i data-lucide="folder" className="text-purple-400"></i>
                            Knowledge Paths
                        </h2>
                        
                        {/* Add Path Form */}
                        <div className="glass-panel p-4 mb-6">
                            <label className="block text-sm text-gray-400 mb-2">Add New Path</label>
                            <div className="flex gap-2">
                                <input
                                    type="text"
                                    value={newPath}
                                    onChange={(e) => setNewPath(e.target.value)}
                                    onKeyDown={(e) => e.key === 'Enter' && handleAddPath()}
                                    placeholder="C:\Users\...\Documents or /home/user/docs"
                                    className="flex-1 bg-white/5 border border-white/10 rounded-lg px-4 py-2.5 focus:border-purple-500/50 outline-none font-mono text-sm"
                                />
                                <button onClick={handleAddPath} disabled={loading} className="btn-primary">
                                    Add
                                </button>
                            </div>
                            {message && (
                                <p className={`mt-2 text-sm ${message.includes('✅') ? 'text-green-400' : 'text-red-400'}`}>
                                    {message}
                                </p>
                            )}
                        </div>

                        {/* Paths List */}
                        <div className="space-y-2">
                            {paths.length === 0 ? (
                                <div className="text-center text-gray-500 py-12">
                                    <i data-lucide="folder-open" className="mx-auto mb-4 opacity-30" width="48"></i>
                                    <p>No paths configured yet</p>
                                    <p className="text-sm mt-2">Add a directory path to start indexing</p>
                                </div>
                            ) : (
                                paths.map((pathItem, i) => {
                                    const pathStr = typeof pathItem === 'string' ? pathItem : pathItem.path;
                                    return (
                                        <div key={i} className="glass-panel p-3 flex items-center justify-between fade-in">
                                            <div className="flex items-center gap-3 overflow-hidden">
                                                <i data-lucide="folder" width="18" className="text-gray-500 flex-shrink-0"></i>
                                                <span className="font-mono text-sm truncate">{pathStr}</span>
                                            </div>
                                            <button
                                                onClick={() => handleRemovePath(pathStr)}
                                                disabled={loading}
                                                className="p-2 hover:bg-red-500/20 rounded-lg transition-colors text-gray-400 hover:text-red-400"
                                            >
                                                <i data-lucide="trash-2" width="16"></i>
                                            </button>
                                        </div>
                                    );
                                })
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // Research Modal
        const ResearchModal = ({ onClose }) => {
            const [url, setUrl] = useState('');
            const [buckets, setBuckets] = useState('');
            const [tags, setTags] = useState('');
            const [loading, setLoading] = useState(false);
            const [message, setMessage] = useState('');

            const handleSubmit = async () => {
                if (!url.trim()) return;
                setLoading(true);
                setMessage('');
                try {
                    const res = await fetch('/v1/research/fetch', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            url: url.trim(),
                            bucket: buckets.trim() || 'web',
                            tags: tags.trim().split(',').map(t => t.trim()).filter(Boolean)
                        })
                    });
                    const data = await res.json();
                    setMessage('✅ Content ingested: ' + (data.message || 'Success'));
                    setUrl('');

                                </div>

                                <div>
                                    <label className="text-sm font-medium block mb-2">Temperature</label>
                                    <input
                                        type="range"
                                        min="0.1"
                                        max="1.0"
                                        step="0.05"
                                        value={settings?.physics?.temperature ?? 0.2}
                                        onChange={(e) => updateSetting('physics', 'temperature', parseFloat(e.target.value))}
                                        className="w-full accent-orange-500 h-2 rounded-lg appearance-none cursor-pointer bg-white/5"
                                    />
                                    <p className="text-xs font-mono text-center mt-1">{settings?.physics?.temperature ?? 0.2}</p>
                                    <p className="text-xs text-orange-400/70 mt-1">
                                        💡 Exploration vs exploitation (higher = more diverse results)
                                    </p>
                                </div>

                                <div>
                                    <label className="text-sm font-medium block mb-2">Walk Radius</label>
                                    <input
                                        type="range"
                                        min="1"
                                        max="5"
                                        step="1"
                                        value={settings?.physics?.walk_radius ?? 1}
                                        onChange={(e) => updateSetting('physics', 'walk_radius', parseInt(e.target.value))}
                                        className="w-full accent-orange-500 h-2 rounded-lg appearance-none cursor-pointer bg-white/5"
                                    />
                                    <p className="text-xs font-mono text-center mt-1">{settings?.physics?.walk_radius ?? 1}</p>
                                    <p className="text-xs text-orange-400/70 mt-1">
                                        💡 Graph traversal depth (1 = direct neighbors, 3+ = distant associations)
                                    </p>
                                </div>

                                <div>
                                    <label className="text-sm font-medium block mb-2">GC Cooldown (ms)</label>
                                    <input
                                        type="range"
                                        min="10000"
                                        max="120000"
                                        step="5000"
                                        value={settings?.resource_management?.gc_cooldown_ms ?? 30000}
                                        onChange={(e) => updateSetting('resource_management', 'gc_cooldown_ms', parseInt(e.target.value))}
                                        className="w-full accent-orange-500 h-2 rounded-lg appearance-none cursor-pointer bg-white/5"
                                    />
                                    <p className="text-xs font-mono text-center mt-1">{settings?.resource_management?.gc_cooldown_ms ?? 30000}ms</p>
                                    <p className="text-xs text-orange-400/70 mt-1">
                                        💡 Time between garbage collection cycles
                                    </p>
                                </div>
                            </div>
                        </div>

                        {/* Database Section */}
                        <div className="glass-panel p-6 mb-6">
                            <h3 className="text-xl font-bold mb-4 flex items-center gap-2 text-red-400">
                                <i data-lucide="database"></i>
                                Database
                            </h3>
                            <div className="flex items-center justify-between p-4 bg-white/5 rounded-lg">
                                <div>
                                    <p className="font-semibold">Wipe Index on Startup</p>
                                    <p className="text-sm text-gray-400">
                                        Standard 051: Ephemeral Index. Rebuild PGlite from mirrored_brain/ on each restart.
                                        Disable for faster startup (risks stale data if inbox changed while stopped).
                                    </p>
                                </div>
                                <input
                                    type="checkbox"
                                    checked={settings?.database?.wipe_on_startup ?? true}
                                    onChange={(e) => updateSetting('database', 'wipe_on_startup', e.target.checked)}
                                    className="w-5 h-5 accent-red-500 flex-shrink-0 ml-4"
                                />
                            </div>
                        </div>

                        {/* Security Section */}
                        <div className="glass-panel p-6 mb-6">
                            <h3 className="text-xl font-bold mb-4 flex items-center gap-2 text-yellow-400">
                                <i data-lucide="shield"></i>
                                Security
                            </h3>
                            {(!settings?.server?.api_key || settings?.server?.api_key === '' || settings?.server?.api_key === 'ece-secret-key') && (
                                <div className="mb-4 p-3 rounded-lg bg-yellow-500/10 border border-yellow-500/30 text-yellow-300 text-sm">
                                    ⚠️ No API key set. All /v1 endpoints are publicly accessible. Set a key to require authentication.
                                </div>
                            )}
                            <div>
                                <label className="block text-sm font-medium mb-2">API Key</label>
                                <input
                                    type="password"
                                    value={settings?.server?.api_key ?? ''}
                                    onChange={(e) => updateSetting('server', 'api_key', e.target.value)}
                                    placeholder="Leave empty to disable authentication"
                                    className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2.5 focus:border-yellow-500/50 outline-none font-mono text-sm"
                                />
                                <p className="text-xs text-gray-500 mt-2">
                                    When set, all /v1 API requests must include <code>Authorization: Bearer &lt;key&gt;</code>
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // Main App
        const App = () => {
            const { route, navigate } = useRouter();
            const [isLoading, setIsLoading] = useState(true);
            const [showResearch, setShowResearch] = useState(false);
            const [showGithub, setShowGithub] = useState(false);
            const [systemStatus, setSystemStatus] = useState({ isBusy: false, state: 'idle' });
            const [isDbEmpty, setIsDbEmpty] = useState(true);

            // Consolidated polling - fetch status and stats together every 30 seconds
            useEffect(() => {
                const fetchAll = async () => {
                    try {
                        // Fetch system status
                        const statusRes = await fetch('/v1/system/status');
                        if (statusRes.ok) {
                            const statusData = await statusRes.json();
                            setSystemStatus(statusData);
                        }
                        
                        // Fetch database stats
                        const statsRes = await fetch('/v1/stats');
                        if (statsRes.ok) {
                            const stats = await statsRes.json();
                            setIsDbEmpty(!stats.atoms && !stats.molecules);
                        }
                    } catch (error) {
                        // Silently fail - will retry on next interval
                    }
                };
                
                fetchAll(); // Initial fetch
                const interval = setInterval(fetchAll, 30000); // Poll every 30 seconds
                return () => clearInterval(interval); // Cleanup on unmount
            }, []);

            useEffect(() => {
                const checkReady = async () => {
                    try {
                        const health = await api.health();
                        // Accept healthy, degraded, or starting status
                        if (health.status === 'healthy' || health.status === 'degraded' || health.status === 'starting') {
                            setIsLoading(false);
                        }
                    } catch (error) {
                        console.log('Waiting for system...');
                    }
                };
                checkReady();
                const interval = setInterval(checkReady, 2000);
                return () => clearInterval(interval);
            }, []);

            useEffect(() => {
                setTimeout(() => lucide.createIcons(), 100);
            }, [route, showResearch, showGithub]);

            if (isLoading) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center">
                        <div className="w-12 h-12 border-4 border-cyan-500/30 border-t-cyan-500 rounded-full animate-spin mb-4"></div>
                        <h1 className="text-xl font-semibold bg-gradient-to-r from-cyan-400 to-purple-400 bg-clip-text text-transparent">
                            Anchor Engine
                        </h1>
                        <p className="text-gray-500 mt-2">Initializing...</p>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col">
                    <Header
                        route={route}
                        navigate={navigate}
                        onOpenResearch={() => setShowResearch(true)}
                        onOpenGithub={() => setShowGithub(true)}
                        systemStatus={systemStatus}
                        isDbEmpty={isDbEmpty}
                    />
                    <main className="flex-1 overflow-hidden">
                        {route === '/search' && <SearchPage />}
                        {route === '/paths' && <PathsPage />}
                        {route === '/quarantine' && <QuarantinePage navigate={navigate} />}
                        {route === '/settings' && <SettingsPage navigate={navigate} />}
                        {route === '/' && <SearchPage />}
                    </main>
                    
                    {/* Modals */}
                    {showResearch && <ResearchModal onClose={() => setShowResearch(false)} />}
                    {showGithub && <GithubModal onClose={() => setShowGithub(false)} />}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
