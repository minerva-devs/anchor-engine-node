        // GitHub Modal
        const GithubModal = ({ onClose }) => {
            const [repoUrl, setRepoUrl] = useState('');
            const [branch, setBranch] = useState('main');
            const [buckets, setBuckets] = useState('');
            const [includeHistory, setIncludeHistory] = useState(true);
            const [loading, setLoading] = useState(false);
            const [message, setMessage] = useState('');

            const handleSubmit = async () => {
                if (!repoUrl.trim()) return;
                setLoading(true);
                setMessage('');
                try {
                    const res = await fetch('/v1/github/repos', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            url: repoUrl.trim(),
                            branch: branch.trim() || 'main',
                            bucket: buckets.trim() || 'code',
                            include_history: includeHistory,
                        })
                    });
                    const data = await res.json();
                    setMessage('✅ ' + (data.message || 'Repository ingestion started'));
                } catch (error) {
                    setMessage('❌ Failed: ' + error.message);
                } finally {
                    setLoading(false);
                    setTimeout(() => setMessage(''), 5000);
                }
            };

            return (
                <div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50 fade-in" onClick={onClose}>
                    <div className="glass-panel w-full max-w-lg p-6 m-4" onClick={e => e.stopPropagation()}>
                        <div className="flex items-center justify-between mb-4">
                            <h3 className="text-xl font-bold flex items-center gap-2">
                                <i data-lucide="github" className="text-green-400"></i>
                                GitHub Ingestion
                            </h3>
                            <button onClick={onClose} className="p-2 hover:bg-white/10 rounded-lg transition-colors">
                                <i data-lucide="x" width="20"></i>
                            </button>
                        </div>
                        
                        <div className="space-y-4">
                            <div>
                                <label className="block text-sm text-gray-400 mb-2">Repository URL</label>
                                <input
                                    type="text"
                                    value={repoUrl}
                                    onChange={(e) => setRepoUrl(e.target.value)}
                                    onKeyDown={(e) => e.key === 'Enter' && handleSubmit()}
                                    placeholder="https://github.com/user/repo"
                                    className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2.5 focus:border-green-500/50 outline-none font-mono text-sm"
                                />
                            </div>
                            <div className="grid grid-cols-2 gap-3">
                                <div>
                                    <label className="block text-sm text-gray-400 mb-2">Branch</label>
                                    <input
                                        type="text"
                                        value={branch}
                                        onChange={(e) => setBranch(e.target.value)}
                                        placeholder="main"
                                        className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2.5 focus:border-green-500/50 outline-none text-sm"
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm text-gray-400 mb-2">Bucket</label>
                                    <input
                                        type="text"
                                        value={buckets}
                                        onChange={(e) => setBuckets(e.target.value)}
                                        placeholder="code"
                                        className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2.5 focus:border-green-500/50 outline-none text-sm"
                                    />
                                </div>
                            </div>
                            <label className="flex items-center gap-3 cursor-pointer select-none">
                                <input
                                    type="checkbox"
                                    checked={includeHistory}
                                    onChange={(e) => setIncludeHistory(e.target.checked)}
                                    className="w-4 h-4 accent-green-400"
                                />
                                <span className="text-sm text-gray-300">
                                    Include full commit history
                                    <span className="text-gray-500 ml-1">(search code changes over time)</span>
                                </span>
                            </label>
                            {message && (
                                <p className={`text-sm ${message.includes('✅') ? 'text-green-400' : 'text-red-400'}`}>
                                    {message}
                                </p>
                            )}
                            <button onClick={handleSubmit} disabled={loading} className="btn-primary w-full">
                                {loading ? 'Cloning...' : 'Clone & Ingest'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // Quarantine Page
        const QuarantinePage = ({ navigate }) => {
            const [atoms, setAtoms] = useState([]);
            const [loading, setLoading] = useState(false);
            const [message, setMessage] = useState('');

            const loadQuarantine = async () => {
                setLoading(true);
                try {
                    const res = await fetch('/v1/quarantine');
                    const data = await res.json();
                    setAtoms(data.atoms || data || []);
                } catch (error) {
                    setMessage('Failed to load quarantine: ' + error.message);
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => {
                loadQuarantine();
                setTimeout(() => lucide.createIcons(), 100);
            }, []);

            const handleRestore = async (id) => {
                try {
                    await fetch(`/v1/quarantine/${id}/restore`, { method: 'POST' });
                    setMessage('✅ Atom restored');
                    loadQuarantine();
                } catch (error) {
                    setMessage('❌ Failed: ' + error.message);
                } finally {
                    setTimeout(() => setMessage(''), 3000);
                }
            };

            const handleDelete = async (id) => {
                if (!confirm('Permanently delete this atom?')) return;
                try {
                    await fetch(`/v1/quarantine/${id}`, { method: 'DELETE' });
                    setMessage('✅ Atom deleted');
                    loadQuarantine();
                } catch (error) {
                    setMessage('❌ Failed: ' + error.message);
                } finally {
                    setTimeout(() => setMessage(''), 3000);
                }
            };

            return (
                <div className="flex-1 flex flex-col overflow-hidden">
                    <div className="p-4 border-b border-white/10 flex items-center justify-between">
                        <div className="flex items-center gap-3">
                            <button onClick={() => navigate('/search')} className="btn-secondary text-sm px-3 py-1.5">
                                ← Back
                            </button>
                            <h2 className="text-xl font-bold flex items-center gap-2 text-red-400">
                                <i data-lucide="shield-alert"></i>
                                Quarantine
                            </h2>
                        </div>
                        <button onClick={loadQuarantine} className="btn-secondary text-sm">
                            Refresh
                        </button>
                    </div>
                    
                    <div className="flex-1 overflow-y-auto p-4">
                        {message && (
                            <div className={`mb-4 p-3 rounded-lg ${message.includes('✅') ? 'bg-green-500/20 text-green-400' : 'bg-red-500/20 text-red-400'}`}>
                                {message}
                            </div>
                        )}
                        
                        {loading && (
                            <div className="text-center text-gray-400 mt-20">
                                <div className="w-8 h-8 border-2 border-red-500/30 border-t-red-500 rounded-full animate-spin mx-auto mb-4"></div>
                                <p>Loading quarantined atoms...</p>
                            </div>
                        )}
                        
                        {!loading && atoms.length === 0 && (
                            <div className="text-center text-gray-500 mt-20">
                                <i data-lucide="shield-check" className="mx-auto mb-4 opacity-30" width="48"></i>
                                <p>Quarantine is empty</p>
                                <p className="text-sm mt-2">No suspicious atoms detected</p>
                            </div>
                        )}
                        
                        {atoms.length > 0 && (
                            <div className="space-y-3">
                                {atoms.map((atom, i) => (
                                    <div key={atom.id || i} className="glass-panel p-4 fade-in border-l-2 border-red-500/50">
                                        <div className="flex items-start justify-between gap-4 mb-2">
                                            <div className="flex items-center gap-2 text-xs text-gray-500">
                                                <i data-lucide="file-text" width="12"></i>
                                                <span className="font-mono">{atom.source || 'Unknown'}</span>
                                            </div>
                                            <div className="flex items-center gap-2">
                                                <button
                                                    onClick={() => handleRestore(atom.id)}
                                                    className="px-3 py-1 text-xs bg-green-500/20 text-green-400 rounded hover:bg-green-500/30 transition-colors"
                                                >
                                                    Restore
                                                </button>
                                                <button
                                                    onClick={() => handleDelete(atom.id)}
                                                    className="px-3 py-1 text-xs bg-red-500/20 text-red-400 rounded hover:bg-red-500/30 transition-colors"
                                                >
                                                    Delete
                                                </button>
                                            </div>
                                        </div>
                                        <p className="text-sm text-gray-300 whitespace-pre-wrap line-clamp-3">
                                            {atom.content}
                                        </p>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // Settings Page
        const SettingsPage = ({ navigate }) => {
            const [settings, setSettings] = useState(null);
            const [watchdogStatus, setWatchdogStatus] = useState({ isRunning: false, watchedPaths: [] });
            const [loading, setLoading] = useState(true);
            const [saving, setSaving] = useState(false);
            const [message, setMessage] = useState('');

            useEffect(() => {
                loadSettings();
                loadWatchdogStatus();
                setTimeout(() => lucide.createIcons(), 100);
            }, []);

            const loadSettings = async () => {
                try {
                    const data = await api.getSettings?.() || await fetch('/v1/settings').then(r => r.json());
                    setSettings(data.settings || data);
                } catch (error) {
                    console.error('Failed to load settings:', error);
                } finally {
                    setLoading(false);
                }
            };

            const loadWatchdogStatus = async () => {
                try {
                    const data = await fetch('/v1/watchdog/status').then(r => r.json());
                    setWatchdogStatus({ isRunning: data.isRunning, watchedPaths: data.watchedPaths || [] });
                } catch (error) {
                    console.error('Failed to load watchdog status:', error);
                }
            };

            const updateSetting = async (category, key, value) => {
                if (!settings) return;
                
                const newSettings = {
                    ...settings,
                    [category]: {
                        ...settings[category],
                        [key]: value
                    }
                };
                setSettings(newSettings);
            };

            const saveSettings = async () => {
                setSaving(true);
                setMessage('');
                try {
                    await fetch('/v1/settings', {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(settings)
                    });
                    setMessage('✅ Settings saved successfully!');
                    setTimeout(() => setMessage(''), 3000);
                } catch (error) {
                    setMessage('❌ Failed to save settings');
                } finally {
                    setSaving(false);
                }
            };

            const toggleWatchdog = async () => {
                setMessage('');
                try {
                    const endpoint = watchdogStatus.isRunning ? '/v1/watchdog/stop' : '/v1/watchdog/start';
                    await fetch(endpoint, { method: 'POST' });
                    await loadWatchdogStatus();
                    setMessage(watchdogStatus.isRunning ? '✅ Watchdog stopped' : '✅ Watchdog started');
                } catch (error) {
                    setMessage('❌ Failed to toggle watchdog');
                }
                setTimeout(() => setMessage(''), 3000);
            };

            const triggerManualIngest = async () => {
                setMessage('');
                try {
                    const result = await fetch('/v1/watchdog/ingest', { method: 'POST' }).then(r => r.json());
                    setMessage(`✅ ${result.message || 'Ingest triggered'}`);
                } catch (error) {
                    setMessage('❌ Failed to trigger ingest');
                }
                setTimeout(() => setMessage(''), 4000);
            };

            const clearDatabase = async () => {
                if (!confirm('Are you sure you want to completely clear the database? This will stop the Watchdog and wipe all ingested data.')) return;
                
                setMessage('');
                try {
                    const result = await fetch('/v1/system/clear-db', { method: 'POST' }).then(r => r.json());
                    await loadWatchdogStatus();
                    setMessage(`✅ ${result.message || 'Database cleared'}`);
                } catch (error) {
                    setMessage('❌ Failed to clear database');
                }
                setTimeout(() => setMessage(''), 4000);
            };

            if (loading) {
                return (
                    <div className="flex-1 flex items-center justify-center">
                        <div className="text-center">
                            <div className="w-12 h-12 border-4 border-cyan-500/30 border-t-cyan-500 rounded-full animate-spin mx-auto mb-4"></div>
                            <p className="text-gray-400">Loading settings...</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex-1 p-6 overflow-y-auto">
                    <div className="max-w-5xl mx-auto">
                        <div className="flex items-center justify-between mb-6">
                            <h2 className="text-2xl font-bold flex items-center gap-3">
                                <i data-lucide="settings" className="text-cyan-400"></i>
                                Settings
                            </h2>
                            <div className="flex gap-2">
                                <button onClick={saveSettings} disabled={saving} className="btn-primary">
                                    {saving ? 'Saving...' : 'Save Settings'}
                                </button>
                            </div>
                        </div>

                        {message && (
                            <div className={`mb-6 p-4 rounded-lg ${message.includes('✅') ? 'bg-green-500/20 border border-green-500/30 text-green-400' : 'bg-red-500/20 border border-red-500/30 text-red-400'}`}>
                                {message}
                            </div>
                        )}
                        
                        {/* Ingestion Control Section */}
                        <div className="glass-panel p-6 mb-6">
                            <h3 className="text-xl font-bold mb-4 flex items-center gap-2 text-green-400">
                                <i data-lucide="folder-sync"></i>
                                Ingestion Control
                            </h3>
                            
                            <div className="flex items-center justify-between mb-4 p-4 bg-white/5 rounded-lg">
                                <div>
                                    <p className="font-semibold">File Watcher</p>
                                    <p className="text-sm text-gray-400">
                                        {watchdogStatus.isRunning ? 'Currently watching for file changes' : 'Currently stopped'}
                                    </p>
                                </div>
                                <div className="flex items-center gap-4">
                                    <div className={`w-3 h-3 rounded-full ${watchdogStatus.isRunning ? 'bg-green-500 animate-pulse' : 'bg-gray-500'}`}></div>
                                    <button onClick={toggleWatchdog} className={`px-4 py-2 rounded-lg font-medium transition-all ${
                                        watchdogStatus.isRunning 
                                            ? 'bg-red-500/20 text-red-400 border border-red-500/30 hover:bg-red-500/30' 
                                            : 'bg-green-500/20 text-green-400 border border-green-500/30 hover:bg-green-500/30'
                                    }`}>
                                        {watchdogStatus.isRunning ? 'Stop Watching' : 'Start Watching'}
                                    </button>
                                </div>
                            </div>
                            
                            <button onClick={triggerManualIngest} className="btn-primary w-full mb-4">
                                <span className="flex items-center justify-center gap-2">
                                    <i data-lucide="zap" width="16"></i>
                                    Trigger Manual Ingest
                                </span>
                            </button>
                            
                            <div className="text-sm text-gray-400">
                                <p className="mb-2 font-semibold">Watched Paths:</p>
                                <ul className="space-y-1 font-mono text-xs">
                                    {watchdogStatus.watchedPaths && watchdogStatus.watchedPaths.length > 0 ? (
                                        watchdogStatus.watchedPaths.map((path, i) => (
                                            <li key={i} className="flex items-center justify-between gap-2 bg-white/5 rounded px-2 py-1">
                                                <div className="flex items-center gap-2 overflow-hidden">
                                                    <i data-lucide="folder" width="12" className="flex-shrink-0"></i>
                                                    <span className="truncate">{path}</span>
                                                </div>
                                                <button
                                                    onClick={async () => {
                                                        try {
                                                            await api.removePath(path);
                                                            setMessage('✅ Path removed');
                                                            setTimeout(() => setMessage(''), 3000);
                                                            // Reload watchdog status
                                                            const statusRes = await fetch('/v1/watchdog/status');
                                                            const status = await statusRes.json();
                                                            setWatchdogStatus(status);
                                                        } catch (error) {
                                                            setMessage('❌ Failed to remove: ' + error.message);
                                                            setTimeout(() => setMessage(''), 3000);
                                                        }
                                                    }}
                                                    className="flex-shrink-0 p-1 hover:bg-red-500/20 rounded transition-colors"
                                                    title="Remove this watched path"
                                                >
                                                    <i data-lucide="x" width="14" className="text-red-400"></i>
                                                </button>
                                            </li>
                                        ))
                                    ) : (
                                        <li className="text-gray-500 italic">No paths currently being watched</li>
                                    )}
                                </ul>
                            </div>
                        </div>

                        {/* Tag Modulation Section */}
                        <div className="glass-panel p-6 mb-6">
                            <h3 className="text-xl font-bold mb-4 flex items-center gap-2 text-purple-400">
                                <i data-lucide="tags"></i>
                                Tag Modulation
                            </h3>
                            <p className="text-xs text-gray-400 mb-4">
                                Controls how tags are generated and filtered during ingestion. Adjust these to balance between precision (fewer, higher-quality tags) and recall (more comprehensive tagging).
                            </p>

                            <div className="space-y-6">
                                <div>
                                    <div className="flex justify-between mb-2">
                                        <label className="text-sm font-medium">Modulation Level</label>
                                        <span className="text-sm font-mono text-cyan-400">{settings?.tagging?.modulation_level ?? 50}%</span>
                                    </div>
                                    <input
                                        type="range"
                                        min="0"
                                        max="100"
                                        value={settings?.tagging?.modulation_level ?? 50}
                                        onChange={(e) => updateSetting('tagging', 'modulation_level', parseInt(e.target.value))}
                                        className="w-full accent-purple-500 h-2 rounded-lg appearance-none cursor-pointer bg-white/5"
                                    />
                                    <p className="text-xs text-gray-500 mt-1">
                                        <strong>0%:</strong> Only named entities (people, places, orgs) • 
                                        <strong>50%:</strong> Balanced (entities + key concepts) • 
                                        <strong>100%:</strong> All detected tags including generic terms
                                    </p>
                                    <p className="text-xs text-purple-400/70 mt-1">
                                        💡 Lower values = cleaner tags, less noise • Higher values = more comprehensive but may include artifacts
                                    </p>
                                </div>

                                <div>
                                    <div className="flex justify-between mb-2">
                                        <label className="text-sm font-medium">Blacklist Strictness</label>
                                        <span className="text-sm font-mono text-cyan-400">{settings?.tagging?.blacklist_strictness ?? 75}%</span>
                                    </div>
                                    <input
                                        type="range"
                                        min="0"
                                        max="100"
                                        value={settings?.tagging?.blacklist_strictness ?? 75}
                                        onChange={(e) => updateSetting('tagging', 'blacklist_strictness', parseInt(e.target.value))}
                                        className="w-full accent-purple-500 h-2 rounded-lg appearance-none cursor-pointer bg-white/5"
                                    />
                                    <p className="text-xs text-gray-500 mt-1">
                                        Controls how aggressively blacklisted tags are filtered (color codes, HTML artifacts, generic terms like "the", "and", etc.)
                                    </p>
                                    <p className="text-xs text-purple-400/70 mt-1">
                                        💡 Higher = stricter filtering (removes more noise) • Lower = more permissive (keeps borderline tags)
                                    </p>
                                </div>

                                <div className="flex items-center justify-between">
                                    <div>
                                        <label className="text-sm font-medium block">Atom as Tag</label>
                                        <p className="text-xs text-gray-500">Use atomized content snippets as tags themselves</p>
                                    </div>
                                    <input
                                        type="checkbox"
                                        checked={settings?.tagging?.atom_as_tag ?? false}
                                        onChange={(e) => updateSetting('tagging', 'atom_as_tag', e.target.checked)}
                                        className="w-4 h-4 accent-purple-500"
                                    />
                                </div>

                                <div className="flex items-center justify-between">
                                    <div>
                                        <label className="text-sm font-medium block">Strict Atom Selection</label>
                                        <p className="text-xs text-gray-500">Only create atoms for high-confidence semantic units</p>
                                    </div>
                                    <input
                                        type="checkbox"
                                        checked={settings?.tagging?.strict_atom_selection ?? true}
                                        onChange={(e) => updateSetting('tagging', 'strict_atom_selection', e.target.checked)}
                                        className="w-4 h-4 accent-purple-500"
                                    />
                                </div>
                            </div>
                        </div>

                        {/* Search Settings Section */}
                        <div className="glass-panel p-6 mb-6">
                            <h3 className="text-xl font-bold mb-4 flex items-center gap-2 text-cyan-400">
                                <i data-lucide="search"></i>
                                Search Settings
                            </h3>
                            <p className="text-xs text-gray-400 mb-4">
                                Configure how search queries are executed and how results are ranked. These settings affect the balance between relevance and recency.
                            </p>

                            <div className="space-y-6">
                                <div>
                                    <div className="flex justify-between mb-2">
                                        <label className="text-sm font-medium">Max Chars Default</label>
                                        <span className="text-sm font-mono text-cyan-400">{(settings?.search?.max_chars_default / 1024).toFixed(0)}K</span>
                                    </div>
                                    <input
                                        type="range"
                                        min="4096"
                                        max="1048576"
                                        step="4096"
                                        value={settings?.search?.max_chars_default ?? 524288}
                                        onChange={(e) => updateSetting('search', 'max_chars_default', parseInt(e.target.value))}
                                        className="w-full accent-cyan-500 h-2 rounded-lg appearance-none cursor-pointer bg-white/5"
                                    />
                                    <p className="text-xs text-gray-500 mt-1">
                                        Maximum context size returned per search (in characters). Larger = more context but uses more tokens.
                                    </p>
                                </div>

                                <div>
                                    <div className="flex justify-between mb-2">
                                        <label className="text-sm font-medium">Relevance Weight</label>
                                        <span className="text-sm font-mono text-cyan-400">{settings?.context?.relevance_weight ?? 0.7}</span>
                                    </div>
                                    <input
                                        type="range"
                                        min="0"
                                        max="1"
                                        step="0.05"
                                        value={settings?.context?.relevance_weight ?? 0.7}
                                        onChange={(e) => {
                                            const val = parseFloat(e.target.value);
                                            updateSetting('context', 'relevance_weight', val);
                                            updateSetting('context', 'recency_weight', Math.round((1 - val) * 100) / 100);
                                        }}
                                        className="w-full accent-cyan-500 h-2 rounded-lg appearance-none cursor-pointer bg-white/5"
                                    />
                                    <p className="text-xs text-gray-500 mt-1">
                                        Balance between semantic relevance (tag overlap, SimHash) vs temporal recency
                                    </p>
                                    <p className="text-xs text-cyan-400/70 mt-1">
                                        💡 Higher = prioritize content match • Lower = prioritize recent content • Recency: {settings?.context?.recency_weight ?? 0.3} (auto-balances)
                                    </p>
                                </div>
                            </div>
                        </div>

                        {/* Physics Settings Section */}
                        <div className="glass-panel p-6 mb-6">
                            <h3 className="text-xl font-bold mb-4 flex items-center gap-2 text-orange-400">
                                <i data-lucide="cpu"></i>
                                Physics & Resources
                            </h3>
                            <p className="text-xs text-gray-400 mb-4">
                                Fine-tune the STAR algorithm's physics-based scoring model. These control how associations propagate through the knowledge graph.
                            </p>

                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="text-sm font-medium block mb-2">Damping Factor</label>
                                    <input
                                        type="range"
                                        min="0.5"
                                        max="0.95"
                                        step="0.05"
                                        value={settings?.physics?.damping_factor ?? 0.85}
                                        onChange={(e) => updateSetting('physics', 'damping_factor', parseFloat(e.target.value))}
                                        className="w-full accent-orange-500 h-2 rounded-lg appearance-none cursor-pointer bg-white/5"
                                    />
                                    <p className="text-xs font-mono text-center mt-1">{settings?.physics?.damping_factor ?? 0.85}</p>
                                    <p className="text-xs text-orange-400/70 mt-1">
                                        💡 Controls how quickly association strength decays with each graph hop
                                    </p>
                                </div>

                                <div>
                                    <label className="text-sm font-medium block mb-2">Temperature</label>
                                    <input
                                        type="range"
                                        min="0.1"
                                        max="1.0"
                                        step="0.05"
                                        value={settings?.physics?.temperature ?? 0.2}
                                        onChange={(e) => updateSetting('physics', 'temperature', parseFloat(e.target.value))}
                                        className="w-full accent-orange-500 h-2 rounded-lg appearance-none cursor-pointer bg-white/5"
                                    />
                                    <p className="text-xs font-mono text-center mt-1">{settings?.physics?.temperature ?? 0.2}</p>
                                    <p className="text-xs text-orange-400/70 mt-1">
                                        💡 Exploration vs exploitation (higher = more diverse results)
                                    </p>
                                </div>

                                <div>
                                    <label className="text-sm font-medium block mb-2">Walk Radius</label>
                                    <input
                                        type="range"
                                        min="1"
                                        max="5"
                                        step="1"
                                        value={settings?.physics?.walk_radius ?? 1}
                                        onChange={(e) => updateSetting('physics', 'walk_radius', parseInt(e.target.value))}
                                        className="w-full accent-orange-500 h-2 rounded-lg appearance-none cursor-pointer bg-white/5"
                                    />
                                    <p className="text-xs font-mono text-center mt-1">{settings?.physics?.walk_radius ?? 1}</p>
                                    <p className="text-xs text-orange-400/70 mt-1">
                                        💡 Graph traversal depth (1 = direct neighbors, 3+ = distant associations)
                                    </p>
                                </div>

                                <div>
                                    <label className="text-sm font-medium block mb-2">GC Cooldown (ms)</label>
                                    <input
                                        type="range"
                                        min="10000"
                                        max="120000"
                                        step="5000"
                                        value={settings?.resource_management?.gc_cooldown_ms ?? 30000}
                                        onChange={(e) => updateSetting('resource_management', 'gc_cooldown_ms', parseInt(e.target.value))}
                                        className="w-full accent-orange-500 h-2 rounded-lg appearance-none cursor-pointer bg-white/5"
                                    />
                                    <p className="text-xs font-mono text-center mt-1">{settings?.resource_management?.gc_cooldown_ms ?? 30000}ms</p>
                                    <p className="text-xs text-orange-400/70 mt-1">
                                        💡 Time between garbage collection cycles
                                    </p>
                                </div>
                            </div>
                        </div>

                        {/* Database Section */}
                        <div className="glass-panel p-6 mb-6">
                            <h3 className="text-xl font-bold mb-4 flex items-center gap-2 text-red-400">
                                <i data-lucide="database"></i>
                                Database
                            </h3>
                            <div className="flex flex-col gap-4">
                                <div className="flex items-center justify-between p-4 bg-white/5 rounded-lg">
                                    <div>
                                        <p className="font-semibold">Wipe Index on Startup</p>
                                        <p className="text-sm text-gray-400">
                                            Standard 051: Ephemeral Index. Rebuild PGlite from mirrored_brain/ on each restart.
                                            Disable for faster startup (risks stale data if inbox changed while stopped).
                                        </p>
                                    </div>
                                    <input
                                        type="checkbox"
                                        checked={settings?.database?.wipe_on_startup ?? true}
                                        onChange={(e) => updateSetting('database', 'wipe_on_startup', e.target.checked)}
                                        className="w-5 h-5 accent-red-500 flex-shrink-0 ml-4"
                                    />
                                </div>
                                <div className="flex flex-col sm:flex-row items-center justify-between p-4 bg-red-500/10 border border-red-500/30 rounded-lg gap-4">
                                    <div>
                                        <p className="font-semibold text-red-400">Danger Zone</p>
                                        <p className="text-sm text-gray-400">
                                            Stop the Watchdog and permanently delete all ingested data. You will need to re-trigger ingestion to rebuild the index.
                                        </p>
                                    </div>
                                    <button onClick={clearDatabase} className="px-4 py-2 bg-red-600 hover:bg-red-700 text-white font-medium rounded-lg transition-colors whitespace-nowrap">
                                        Clear Database
                                    </button>
                                </div>
                            </div>
                        </div>

                        {/* Security Section */}
                        <div className="glass-panel p-6 mb-6">
                            <h3 className="text-xl font-bold mb-4 flex items-center gap-2 text-yellow-400">
                                <i data-lucide="shield"></i>
                                Security
                            </h3>
                            {(!settings?.server?.api_key || settings?.server?.api_key === '' || settings?.server?.api_key === 'ece-secret-key') && (
                                <div className="mb-4 p-3 rounded-lg bg-yellow-500/10 border border-yellow-500/30 text-yellow-300 text-sm">
                                    ⚠️ No API key set. All /v1 endpoints are publicly accessible. Set a key to require authentication.
                                </div>
                            )}
                            <div>
                                <label className="block text-sm font-medium mb-2">API Key</label>
                                <input
                                    type="password"
                                    value={settings?.server?.api_key ?? ''}
                                    onChange={(e) => updateSetting('server', 'api_key', e.target.value)}
                                    placeholder="Leave empty to disable authentication"
                                    className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2.5 focus:border-yellow-500/50 outline-none font-mono text-sm"
                                />
                                <p className="text-xs text-gray-500 mt-2">
                                    When set, all /v1 API requests must include <code>Authorization: Bearer &lt;key&gt;</code>
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // Main App
        const App = () => {
            const { route, navigate } = useRouter();
            const [isLoading, setIsLoading] = useState(true);
            const [showResearch, setShowResearch] = useState(false);
            const [showGithub, setShowGithub] = useState(false);
            const [systemStatus, setSystemStatus] = useState({ isBusy: false, state: 'idle' });
            const [stats, setStats] = useState({ atoms: 0, molecules: 0 });
            const [isDbEmpty, setIsDbEmpty] = useState(true);
            const [isDrawerOpen, setIsDrawerOpen] = useState(false);

            // Adaptive polling: 3s when ingesting, 30s when idle
            useEffect(() => {
                let intervalId = null;

                const fetchAll = async () => {
                    try {
                        const statusRes = await fetch('/v1/system/status');
                        let isBusy = false;
                        if (statusRes.ok) {
                            const statusData = await statusRes.json();
                            isBusy = statusData.isBusy;
                            setSystemStatus(prev => {
                                // Re-schedule when busy state changes
                                if ((prev.isBusy) !== (statusData.isBusy)) {
                                    clearInterval(intervalId);
                                    intervalId = setInterval(fetchAll, statusData.isBusy ? 3000 : 30000);
                                }
                                return statusData;
                            });
                        }

                        // When busy, we want to see live stats updates
                        const statsRes = await fetch('/v1/stats');
                        if (statsRes.ok) {
                            const statsData = await statsRes.json();
                            setStats(statsData);
                            setIsDbEmpty(!statsData.atoms && !statsData.molecules);
                        }
                    } catch (error) {
                        // Silently fail - will retry on next interval
                    }
                };

                fetchAll(); // Initial fetch
                intervalId = setInterval(fetchAll, 30000); // Start at idle rate
                return () => clearInterval(intervalId);
            }, []);

            useEffect(() => {
                const checkReady = async () => {
                    try {
                        const health = await api.health();
                        // Accept healthy, degraded, or starting status
                        if (health.status === 'healthy' || health.status === 'degraded' || health.status === 'starting') {
                            setIsLoading(false);
                        }
                    } catch (error) {
                        console.log('Waiting for system...');
                    }
                };
                checkReady();
                const interval = setInterval(checkReady, 2000);
                return () => clearInterval(interval);
            }, []);

            useEffect(() => {
                setTimeout(() => lucide.createIcons(), 100);
            }, [route, showResearch, showGithub, isDrawerOpen]);

            if (isLoading) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center">
                        <div className="w-12 h-12 border-4 border-cyan-500/30 border-t-cyan-500 rounded-full animate-spin mb-4"></div>
                        <h1 className="text-xl font-semibold bg-gradient-to-r from-cyan-400 to-purple-400 bg-clip-text text-transparent">
                            Anchor Engine
                        </h1>
                        <p className="text-gray-500 mt-2">Initializing...</p>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col">
                    <Header
                        route={route}
                        navigate={navigate}
                        onOpenResearch={() => setShowResearch(true)}
                        onOpenGithub={() => setShowGithub(true)}
                        systemStatus={systemStatus}
                        isDbEmpty={isDbEmpty}
                    />
                    <MobileHeader
                        route={route}
                        navigate={navigate}
                        onOpenResearch={() => setShowResearch(true)}
                        onOpenGithub={() => setShowGithub(true)}
                        systemStatus={systemStatus}
                        isDbEmpty={isDbEmpty}
                        onMenuClick={() => setIsDrawerOpen(true)}
                    />
                    <MobileDrawer
                        isOpen={isDrawerOpen}
                        onClose={() => setIsDrawerOpen(false)}
                        route={route}
                        navigate={navigate}
                        onOpenGithub={() => setShowGithub(true)}
                        onOpenResearch={() => setShowResearch(true)}
                    />
                    <main className="flex-1 overflow-hidden">
                        {route === '/search' && <SearchPage stats={stats} />}
                        {route === '/paths' && <PathsPage />}
                        {route === '/quarantine' && <QuarantinePage navigate={navigate} />}
                        {route === '/settings' && <SettingsPage navigate={navigate} />}
                        {route === '/' && <SearchPage stats={stats} />}
                    </main>

                    {/* Modals */}
                    {showResearch && <ResearchModal onClose={() => setShowResearch(false)} />}
                    {showGithub && <GithubModal onClose={() => setShowGithub(false)} />}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
